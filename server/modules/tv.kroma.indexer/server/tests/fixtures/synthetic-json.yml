# Clean-room Cardigann definition authored for KROMA's tests (JSON response
# path). NOT derived from any GPL definition set.
---
id: synthetic-json
name: Synthetic JSON Tracker
description: "Test-only definition for kroma-indexer (JSON path)"
language: en-US
type: public
encoding: UTF-8
links:
  - https://json.example/

caps:
  categorymappings:
    - {id: 100, cat: Movies, desc: "Movies"}
    - {id: 200, cat: TV, desc: "TV"}
  modes:
    search: [q]
    movie-search: [q, imdbid]
  allowrawsearch: true

search:
  paths:
    - path: "api/search?query={{ .Keywords }}"
      response:
        type: json
  rows:
    selector: results
    count:
      selector: total
  fields:
    category:
      selector: category_id
    title:
      selector: name
    _id:
      selector: id
    details:
      text: "/torrent/{{ .Result._id }}"
    download:
      text: "/download/{{ .Result._id }}.torrent"
    infohash:
      selector: info_hash
    size:
      selector: size_bytes
    seeders:
      selector: seeders
    leechers:
      selector: leechers
