[package]
name = "luma-whisper"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "In-process Whisper subtitle transcription (candle, no external whisper.cpp)"
license.workspace = true

[features]
# Off by default: the public `transcribe()` compiles to a stub returning None.
# `local` pulls in the candle inference graph (the only real backend).
local = ["dep:candle-core", "dep:candle-nn", "dep:candle-transformers", "dep:tokenizers", "dep:tracing"]

# GPU acceleration for local dev builds (never the musl single binary). Each
# widens what the CPU pure-Rust `local` build CAN use; the engine picks the
# device at runtime and falls back to CPU. See luma-server's whisper-* features.
metal = ["local", "candle-core/metal", "candle-nn/metal", "candle-transformers/metal"]
cuda = ["local", "candle-core/cuda", "candle-nn/cuda", "candle-transformers/cuda"]
accelerate = ["local", "candle-core/accelerate", "candle-nn/accelerate", "candle-transformers/accelerate"]

[dependencies]
luma-module-sdk = { workspace = true }
anyhow = { workspace = true }
# Only used by the candle inference path, so optional + pulled by `local`.
serde_json = { workspace = true }
tracing = { workspace = true, optional = true }
# CPU-only pure-Rust backends by default so the musl single binary keeps linking.
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }
candle-transformers = { workspace = true, optional = true }
tokenizers = { workspace = true, optional = true }

# Apple-Silicon dev builds light up the Metal GPU automatically (no explicit
# --features metal): gated on the target OS so the Linux/musl build never pulls
# Metal in. Inert until `local` actually pulls candle.
[target.'cfg(target_os = "macos")'.dependencies]
candle-core = { workspace = true, optional = true, features = ["metal"] }
candle-nn = { workspace = true, optional = true, features = ["metal"] }
candle-transformers = { workspace = true, optional = true, features = ["metal"] }
