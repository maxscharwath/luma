[package]
name = "luma-scene"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "Release-name parsing and the acquisition decision engine (pure, zero I/O)"
license.workspace = true

[dependencies]
# Pure parser/scorer: only needs the low manifest layer for its MODULE const, so
# the SDK facade can re-export it (luma_module_sdk::scene) to consumer modules.
luma-module-manifest = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }
