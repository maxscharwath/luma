[package]
name = "kroma-remote"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "KROMA Remote access module (backend): the managed Cloudflare Tunnel connector + its admin routes, over the HostCtx seam (no dependency on the app)."
license.workspace = true

# The out-of-process module binary: `kroma run` → `serve()`. The lib target stays
# for the (transitional) in-process path; the bin is the .kmod entrypoint.
[[bin]]
name = "kroma-module-remote"
path = "src/bin/module.rs"

[dependencies]
kroma-module-sdk = { workspace = true }
kroma-module-runtime = { workspace = true }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
