[package]
name = "luma-torrent"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "DownloadClient trait + torrent engines (embedded librqbit, Transmission, qBittorrent)"
license.workspace = true

[features]
# The embedded librqbit engine. Off = the "rqbit" client kind compiles as a
# stub reporting "not compiled"; Transmission/qBittorrent (plain curl) remain.
rqbit = ["dep:librqbit", "tokio/rt-multi-thread"]

[dependencies]
luma-module-sdk = { workspace = true }
# The download manager + monitor (formerly the luma-downloads crate) live here now,
# so the module owns its whole backend and nothing download-related sits in crates/.
# The admin routes (queue / clients / organize) moved into this crate need the
# axum router + extractors, exactly like the vpn / indexer module crates.
axum = { workspace = true }
# The module owns its `downloads` / `download_clients` tables now (schema + typed
# queries), so it talks to SQLite directly through the pool luma-db hands out.
rusqlite = { workspace = true }
# The organize vertical (moved out of the core luma-engine crate) lives here: it
# orchestrates the app (luma-engine) and parses release names via luma-scene. The
# db facade re-exports the indexers table from luma-indexer for the queue view.
# The acquisition vertical is its own crate (luma-acquisition), which deps THIS one.
sha1 = "0.10"
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
# Pinned to 8.x: 9.0 (beta) moves socks_proxy_url/peer_opts into a new
# ConnectionOptions shape. default-features off drops native-tls (openssl) and
# the built-in HTTP API; rust-tls keeps the musl single binary linking.
librqbit = { version = "8", optional = true, default-features = false, features = ["rust-tls"] }
# The async admin routes + downloads monitor need spawn_blocking + timers
# unconditionally (independent of the embedded engine); the `rqbit` feature layers
# on the multi-thread runtime the librqbit session drives.
tokio = { version = "1", features = ["rt", "time"] }
