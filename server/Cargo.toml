[package]
name = "luma-server"
version = "0.1.1"
edition = "2021"
rust-version = "1.81"
description = "LUMA — a self-hosted, direct-play media streaming server"
license = "MIT"

[[bin]]
name = "luma-server"
path = "src/main.rs"

[dependencies]
axum = { version = "0.7", features = ["macros", "ws"] }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["io"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace", "fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
anyhow = "1"
walkdir = "2"
# Parallel directory walk — hides per-readdir/per-stat network latency over SMB
# (a serial walkdir of ~1000 folders is minutes; jwalk on a big pool is seconds).
jwalk = "0.8"
sha2 = "0.10"
hex = "0.4"
# Pinned: time >= 0.3.37 requires the edition2024 cargo feature (not in rustc 1.81).
time = { version = "=0.3.36", features = ["formatting", "macros"] }

# Embedded SQLite. `bundled` compiles SQLite from source (no system libsqlite3
# needed). We hand-roll a tiny WAL connection pool (see db.rs) rather than pull
# r2d2_sqlite, which drags in uuid → rand → edition2024 (unbuildable on 1.81).
rusqlite = { version = "0.31", features = ["bundled"] }

# mDNS / DNS-SD advertising so LAN clients can auto-discover the server
# (resolves `luma.local` + advertises `_luma._tcp`). Pure Rust.
mdns-sd = "0.11"

# Filesystem change notifications (instant re-scan when the server is local to the
# media; on network mounts we fall back to a periodic re-scan — see watch.rs).
notify = "6"

# System metrics (CPU / RAM / disks) for the admin dashboard. Cross-platform
# (Linux NAS + macOS dev), libc-based, MSRV-friendly for rustc 1.81.
sysinfo = "0.30"

# Smart Hub preview "cards": composite a landscape backdrop + LUMA logo + title +
# badge into a JPEG, fully in-process (no resvg/font-system deps, 1.81-safe).
# tiny-skia = raster/gradients/shapes, fontdue = glyph rasterization,
# jpeg-encoder = output. The backdrop is pre-scaled to PNG by ffmpeg and decoded
# by tiny-skia natively. See api/card.rs.
tiny-skia = "0.11"
fontdue = "0.9"
jpeg-encoder = "0.6"

# Generates the TypeScript wire types in packages/core/src/generated from the
# `#[derive(TS)]` model/DTO structs (single source of truth; see
# scripts/gen-types.sh). `serde-compat` makes it honor our serde rename/rename_all.
# Effectively build-time only: the `TS` impls are unused at runtime and dropped by
# release LTO+strip. Builds cleanly on the pinned rustc 1.81 (only 3 added crates).
ts-rs = { version = "12.0.1", features = ["serde-compat"] }

# Keep the dependency graph lean and 1.81-friendly.
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
