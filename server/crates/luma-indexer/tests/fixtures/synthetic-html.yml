# Clean-room Cardigann definition authored for LUMA's tests. NOT derived from
# any GPL definition set — it exercises the schema/engine against an HTML
# tracker with a login, category mappings, and typical field filters.
---
id: synthetic-html
name: Synthetic HTML Tracker
description: "Test-only definition for luma-indexer (HTML/CSS path)"
language: en-US
type: private
encoding: UTF-8
requestDelay: 2
links:
  - https://tracker.example/
legacylinks:
  - https://old.tracker.example/

caps:
  categorymappings:
    - {id: 1, cat: Movies/HD, desc: "Movies HD"}
    - {id: 2, cat: TV/HD, desc: "TV HD"}
    - {id: 3, cat: Movies/UHD, desc: "Movies 4K"}
  modes:
    search: [q]
    tv-search: [q, season, ep, imdbid]
    movie-search: [q, imdbid, tmdbid]
  allowrawsearch: true

settings:
  - name: username
    type: text
    label: Username
  - name: password
    type: password
    label: Password
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false
  - name: sort
    type: select
    label: Sort
    default: seeders
    options:
      seeders: Seeders
      added: Added

login:
  path: login.php
  method: form
  form: form#login
  inputs:
    username: "{{ .Config.username }}"
    password: "{{ .Config.password }}"
  error:
    - selector: div.error
  test:
    path: /
    selector: a[href="/logout.php"]

search:
  paths:
    - path: "browse.php?q={{ .Keywords }}&sort={{ .Config.sort }}{{ if .Config.freeleech }}&fl=1{{ else }}{{ end }}"
  keywordsfilters:
    - name: re_replace
      args: ["(^|\\s)-", " "]
  rows:
    selector: table.results tr.torrent
  fields:
    category:
      selector: td.cat a
      attribute: href
      filters:
        - name: regexp
          args: "cat=(\\d+)"
    title:
      selector: td.name a
    details:
      selector: td.name a
      attribute: href
    download:
      selector: a.download
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeds
    leechers:
      selector: td.leech
    date:
      selector: td.age
      filters:
        - name: timeago
    downloadvolumefactor:
      case:
        span.freeleech: 0
        "*": 1
    uploadvolumefactor:
      text: "1"
