# SonarCloud configuration for KROMA (maxscharwath_kroma).
#
# Read by the CI scanner (.github/workflows/sonar.yml). To activate CI-based
# analysis you must, in SonarCloud > Administration > Analysis Method, turn OFF
# "Automatic Analysis" and add a SONAR_TOKEN repository secret. Until then the
# repo keeps being scanned by Automatic Analysis, which honors the exclusions
# below but not coverage import.
sonar.projectKey=maxscharwath_kroma
sonar.organization=maxscharwath
sonar.sourceEncoding=UTF-8

# Whole repo is the source root; the exclusions below carve out everything that
# is generated, vendored, built, or runtime data.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Generated code, vendored caches, build output, lockfiles and runtime data are
# not authored here and must not be analyzed.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/target/**,\
  **/generated/**,\
  **/*.gen.ts,\
  packages/modules-generated/**,\
  server/crates/kroma-modules-generated/**,\
  clients/synology/.cache/**,\
  clients/web/src/routeTree.gen.ts,\
  **/*.min.js,\
  **/vendor/**,\
  data/**,\
  **/*.lock,\
  bun.lock

# Coverage (JS/TS via vitest v8 -> lcov; Rust via cargo-llvm-cov -> lcov).
# Missing report paths only warn, so a partial run never blocks the scan.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.rust.lcov.reportPaths=server/lcov.info

# Glue that has no meaningful unit-test surface is excluded from the coverage
# denominator (still analyzed for issues, just not counted as "uncovered").
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.config.ts,\
  **/*.config.js,\
  **/vite.config.*,\
  **/vitest.config.*,\
  scripts/**,\
  clients/*/index*.html,\
  clients/tv-build/**,\
  clients/tv-frame.vite.ts,\
  **/*.d.ts,\
  server/build.rs,\
  server/xtask/**,\
  **/main.rs,\
  clients/desktop/src-tauri/**,\
  **/*.tsx,\
  server/crates/kroma-engine/src/infra/**,\
  server/crates/kroma-module-runtime/**,\
  server/crates/kroma-module-supervisor/**,\
  server/modules/tv.kroma.whisper/**,\
  server/modules/tv.kroma.remote/**,\
  server/modules/tv.kroma.vpn/**,\
  server/modules/tv.kroma.torrents/server/src/rqbit.rs,\
  server/modules/tv.kroma.torrents/server/src/downloads/**,\
  server/modules/tv.kroma.torrents/server/src/organize/**,\
  server/modules/tv.kroma.indexer/server/src/session.rs,\
  server/modules/tv.kroma.indexer/server/src/routes.rs,\
  server/modules/tv.kroma.acquisition/server/src/search.rs,\
  server/modules/tv.kroma.acquisition/server/src/import.rs,\
  server/modules/tv.kroma.acquisition/server/src/auto.rs,\
  server/src/api/**,\
  server/modules/*/server/src/routes/**,\
  server/modules/*/server/src/routes.rs,\
  server/modules/*/server/src/admin.rs,\
  server/crates/kroma-engine/src/services/markers/job.rs

# Coverage-scope rationale: the lines above are genuinely-external or glue that a
# unit test can't meaningfully exercise: process-spawning + network + platform
# infra, module network/IO, the module runtime/supervisor, binary entry points,
# React view components (logic lives in separately-tested .ts), the axum HTTP
# handler layer + module HTTP routes (thin request/response wiring; the logic
# they delegate to lives in the DB + service layer, which IS unit-tested), and
# the ffmpeg/chromaprint marker fingerprinting. The DB, service/business logic,
# domain, parsers, SDK ports, and port bridges stay IN scope and are unit-tested.

# Duplication (copy/paste) detection exclusions. Test files legitimately repeat
# setup/fixtures, and the module verticals are INTENTIONALLY independent (the
# microkernel keeps 0 internal coupling): two torrent-engine backends and two
# provisioning flows that look similar must not be coupled into shared code.
sonar.cpd.exclusions=\
  **/tests.rs,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  server/modules/tv.kroma.engine.qbittorrent/server/src/lib.rs,\
  server/modules/tv.kroma.engine.transmission/server/src/lib.rs,\
  server/modules/tv.kroma.remote/server/src/provision.rs,\
  server/modules/tv.kroma.vpn/server/src/provision.rs,\
  clients/web/src/features/admin/naming-tokens.tsx,\
  server/crates/kroma-engine/src/services/pipeline/stages/*.rs

# ---------------------------------------------------------------------------
# Justified "won't fix" suppressions. Each is an intentional, reviewed choice;
# see the comment for why it is safe in this codebase. Prefer a code fix over a
# new entry here.
# ---------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=md5spk,pathtool,rndsess,httplan,httptizen,httpph,httpdev,dockerroot,cleartext,obfusc,gradlelock,viewport,dlgrole,postercard,videoplane,nestbtnpipe,nestbtnreq,ghscripts,dkscripts,devecho,viteesbuild,playerbtn,settingsbtn,subre,playercplx,pipecplx

# MD5 is the checksum field the Synology package-repo format mandates; integrity
# marker, never a security/crypto context.
sonar.issue.ignore.multicriteria.md5spk.ruleKey=typescript:S4790
sonar.issue.ignore.multicriteria.md5spk.resourceKey=packages/synology-repo/src/spk.ts

# Build/catalog tooling resolving `tar`/`gh` via PATH; runs only in trusted
# dev/CI shells, and absolute paths would break macOS<->Linux portability.
sonar.issue.ignore.multicriteria.pathtool.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.pathtool.resourceKey=packages/synology-repo/src/**

# Non-crypto playback session id (Date.now + random suffix); collision-tolerant
# telemetry key, not a secret.
sonar.issue.ignore.multicriteria.rndsess.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.rndsess.resourceKey=packages/ui/src/playback.ts

# LAN discovery default: a self-hosted KROMA server on the local network speaks
# plain http (kroma.local:4040); there is no TLS to use.
sonar.issue.ignore.multicriteria.httplan.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.httplan.resourceKey=packages/core/src/discover.ts

# "http://tizen.org/appcontrol/..." is a Tizen platform operation identifier,
# not a network URL.
sonar.issue.ignore.multicriteria.httptizen.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.httptizen.resourceKey=packages/tv/src/shared/preview/service.ts

# Example placeholder text inside a form input (a LAN indexer URL); never fetched.
sonar.issue.ignore.multicriteria.httpph.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.httpph.resourceKey=server/modules/tv.kroma.indexer/ui/src/indexer-modals.tsx

# Dev-only HTML shell used against a local http dev server.
sonar.issue.ignore.multicriteria.httpdev.ruleKey=javascript:S5332
sonar.issue.ignore.multicriteria.httpdev.resourceKey=clients/tizen/public/index.dev.html

# Self-hosted media server: containers bind-mount host media with arbitrary
# ownership and follow the PUID/PGID convention, so a hardcoded non-root USER
# would break volume access.
sonar.issue.ignore.multicriteria.dockerroot.ruleKey=docker:S6471
sonar.issue.ignore.multicriteria.dockerroot.resourceKey=server/Dockerfile*

# Android TV client talks to the self-hosted server over plain http on the LAN;
# cleartext is required by design (see the manifest comment).
sonar.issue.ignore.multicriteria.cleartext.ruleKey=xml:S5332
sonar.issue.ignore.multicriteria.cleartext.resourceKey=clients/androidtv/android/app/src/main/AndroidManifest.xml

# The Android app is a thin WebView + ExoPlayer shell; R8/obfuscation wins
# nothing and risks breaking the JS<->native ExoBridge names.
sonar.issue.ignore.multicriteria.obfusc.ruleKey=kotlin:S7204
sonar.issue.ignore.multicriteria.obfusc.resourceKey=clients/androidtv/android/app/build.gradle.kts

# Gradle plugin/dependency versions are already explicitly pinned; a lockfile is
# optional hardening out of scope for this repo.
sonar.issue.ignore.multicriteria.gradlelock.ruleKey=text:S8569
sonar.issue.ignore.multicriteria.gradlelock.resourceKey=clients/androidtv/android/build.gradle.kts

# 10-foot TV / kiosk shells navigated by remote (or a fullscreen desktop app):
# pinch-zoom does not apply, and locking the viewport is intentional UX.
sonar.issue.ignore.multicriteria.viewport.ruleKey=Web:S7926
sonar.issue.ignore.multicriteria.viewport.resourceKey=clients/**/index*.html

# --- S6819 (aria role vs native element): keyboard a11y (role + tabIndex +
# Enter/Space onKeyDown) is already present in each of these; only the native
# element swap is declined, for a concrete, reviewed reason. ---

# Modal keeps role="dialog"+aria-modal: a native <dialog> carries UA styles
# (position/margin/color) that would shift this fixed, flex-centered, color-
# inheriting modal (wrong text color on the dark theme).
sonar.issue.ignore.multicriteria.dlgrole.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.dlgrole.resourceKey=packages/admin-kit/src/forms.tsx

# Shared poster card renders on Chromium-53 legacy TV webviews; swapping the
# styled div to a native <button> risks appearance regressions there.
sonar.issue.ignore.multicriteria.postercard.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.postercard.resourceKey=packages/ui/src/components/PosterCard.tsx

# role="img" sits on the transparent native video-plane div (mpv/ExoPlayer
# renders behind it); it has no image src to move to a native <img>.
sonar.issue.ignore.multicriteria.videoplane.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.videoplane.resourceKey=packages/tv/src/features/playback/TvPlayer.tsx

# The role="button" span is nested INSIDE the row's own <button>; a native
# button cannot be nested in a button.
sonar.issue.ignore.multicriteria.nestbtnpipe.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.nestbtnpipe.resourceKey=clients/web/src/features/admin/pipeline-row.tsx
sonar.issue.ignore.multicriteria.nestbtnreq.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.nestbtnreq.resourceKey=clients/web/src/features/admin/request-row.tsx

# `bun install` runs from a frozen, integrity-checked lockfile; bun does not
# execute dependency lifecycle scripts by default (only the native toolchain
# packages the build needs), so forcing --ignore-scripts would break the build
# without adding safety.
sonar.issue.ignore.multicriteria.ghscripts.ruleKey=githubactions:S6505
sonar.issue.ignore.multicriteria.ghscripts.resourceKey=.github/workflows/*.yml

# Same for the Docker build: `npm install -g bun` relies on bun's own postinstall
# to fetch its binary, and `bun install` uses the frozen lockfile.
sonar.issue.ignore.multicriteria.dkscripts.ruleKey=docker:S6505
sonar.issue.ignore.multicriteria.dkscripts.resourceKey=server/Dockerfile

# Informational echo printing the LAN dev-server URL (the dev server is http on
# localhost by design); not a network call.
sonar.issue.ignore.multicriteria.devecho.ruleKey=shell:S5332
sonar.issue.ignore.multicriteria.devecho.resourceKey=clients/tizen/scripts/dev-device.sh

# Vite 8 marks the UserConfig['esbuild'] type @deprecated, but this is an
# intentional, documented console/debugger strip on production builds that still
# works at runtime; migrating away would drop the strip.
sonar.issue.ignore.multicriteria.viteesbuild.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.viteesbuild.resourceKey=clients/desktop/vite.config.ts

# Shared player chrome: role="button" wraps the <video> surface + subtitles +
# spinner (a native <button> cannot contain them) and renders more reliably on
# legacy TV webviews; keyboard a11y (tabIndex + Enter/Space onKeyDown) is present.
sonar.issue.ignore.multicriteria.playerbtn.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.playerbtn.resourceKey=packages/ui/src/player/Player.tsx
sonar.issue.ignore.multicriteria.settingsbtn.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.settingsbtn.resourceKey=packages/ui/src/player/SettingsPanel.tsx

# `/<[^>]+>/g` cannot backtrack catastrophically: the negated class excludes the
# `>` terminator, so the quantifier never gives back characters to match it. It
# also runs only over trusted, bounded subtitle-cue text. False positive.
sonar.issue.ignore.multicriteria.subre.ruleKey=typescript:S8786
sonar.issue.ignore.multicriteria.subre.resourceKey=packages/ui/src/player/SubtitleRenderer.tsx

# Top-level composition-root components: the shared <Player> (web + legacy TV) and
# the admin PipelinePage already have their cohesive logic extracted into hooks/
# subcomponents; the residual complexity is inherent to wiring state + effects +
# child composition, and splitting further would fragment cohesive UI, not clarify.
sonar.issue.ignore.multicriteria.playercplx.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.playercplx.resourceKey=packages/ui/src/player/Player.tsx
sonar.issue.ignore.multicriteria.pipecplx.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.pipecplx.resourceKey=clients/web/src/features/admin/pipeline.tsx
