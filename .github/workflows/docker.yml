name: Docker image

# Builds the LUMA server image (Rust API + web SPA + ffmpeg) and pushes it to the
# GitHub Container Registry (ghcr.io/<owner>/luma). Path-filtered so only
# server/web/shared changes rebuild it; also on version tags.
on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'server/**'
      - 'clients/web/**'
      - 'packages/**'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push to ghcr

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve version
        id: v
        shell: bash
        run: |
          BASE="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' server/Cargo.toml | head -1)"
          BUILD=$(( ( $(date -u +%s) - 1577836800 ) / 60 ))
          echo "version=$BASE-$BUILD" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags/labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.v.outputs.version }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # amd64 only for now (fast; covers Intel/AMD NAS + servers). arm64 is a
      # one-line add (+ setup-qemu) but ~5-10x slower to compile under emulation.
      - name: Build & push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
