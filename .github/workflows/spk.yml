name: Build .spk

# On-demand Synology package build: produces just the x86_64 .spk (no desktop
# matrix, no Release). Use this to get a NAS package for testing without cutting a
# full `vX.Y.Z` release (which the Release workflow handles, .spk included).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.1.2). Defaults to a dev string.'
        required: false

permissions:
  contents: read

jobs:
  spk:
    name: Synology .spk (x86_64 musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          [ -n "$V" ] || V="0.0.0-dev+${GITHUB_SHA::7}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version $V"

      # Caches the static ffmpeg download + the musl cargo registry across runs
      # (see clients/synology/.cache in build.sh) to keep rebuilds fast.
      - name: Cache build inputs
        uses: actions/cache@v4
        with:
          path: clients/synology/.cache
          key: synology-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: synology-

      # build.sh: web SPA -> static musl luma-server (Docker musl image) ->
      # static ffmpeg -> assembles the .spk. Docker is preinstalled on the runner.
      - name: Build .spk
        run: clients/synology/build.sh "${{ steps.ver.outputs.version }}"

      - name: Upload .spk artifact
        uses: actions/upload-artifact@v4
        with:
          name: luma-synology-spk
          path: clients/synology/dist/*.spk
          if-no-files-found: error
