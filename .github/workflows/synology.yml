name: Synology

# Everything for the server deliverables in ONE workflow:
#   tag vX.Y.Z  -> build the stable .spk + attach it (+ its .info.json sidecar)
#                  to that GitHub Release
#   push main   -> build a canary .spk -> rolling `nightly` prerelease
#   either      -> push the MULTI-ARCH Docker image (linux/amd64 + linux/arm64)
#                  ASSEMBLED FROM static musl binaries + the web SPA (no
#                  from-source docker compile): amd64 reuses the .spk payload,
#                  arm64 comes from its own cross-compile job (Raspberry Pi
#                  4/5 and other ARM64 hosts)
#
# The package source is the DYNAMIC Cloudflare Worker at packages.kroma.tv
# (packages/synology-repo/worker); it reads releases + the .info.json sidecars
# straight from the GitHub API, so it needs NO deploy here. Stable + nightly
# share one build job (only the version differs).
on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

concurrency:
  group: synology-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.14'

jobs:
  # Cheap gate: skip the whole build for main pushes that cannot change the
  # .spk/Docker image (TV-only, desktop-only, docs commits). Tags and manual
  # runs always build.
  changes:
    name: Detect relevant changes
    permissions:
      contents: read
    # Branch pushes only: tags/dispatch always build, and dorny's diff base is
    # undefined on tag pushes.
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      relevant: ${{ steps.f.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: f
        with:
          filters: |
            relevant:
              - 'server/**'
              - 'clients/web/**'
              - 'clients/synology/**'
              - 'packages/**'
              - 'bun.lock'
              - '.github/workflows/synology.yml'

  build:
    name: Build .spk
    needs: changes
    permissions:
      contents: read
    # `always()` so a SKIPPED changes job (tag / dispatch) still lets the tag
    # and dispatch legs run; a main push only builds when relevant files changed.
    if: >-
      always() && !cancelled()
      && (startsWith(github.ref, 'refs/tags/v')
          || github.event_name == 'workflow_dispatch'
          || needs.changes.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Tag -> that version minus the leading `v`. main / dispatch -> empty, so
      # build.sh derives it from server/Cargo.toml and stamps the nightly build.
      - id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Static ffmpeg + musl cargo registry + THE MUSL TARGET DIR. Without the
      # target dir every push cold-compiled the whole workspace (candle,
      # librqbit, ...) for ~10 min; warm, only changed crates rebuild. The
      # version-bump commit changes Cargo.lock, so restore-keys fall back to
      # the newest previous cache.
      - name: Cache build inputs + musl target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            clients/synology/.cache
            server/target/x86_64-unknown-linux-musl
            server/target/release
          key: synology-v2-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            synology-v2-
            synology-

      # build.sh: web SPA -> static musl kroma-server -> static ffmpeg -> .spk.
      - name: Build .spk
        run: clients/synology/build.sh ${{ steps.ver.outputs.version }}

      # The Docker musl build writes root-owned files into the cache + target;
      # hand them back so actions/cache can save (else it fails silently and
      # never persists - which is exactly why the old cache stayed cold).
      - name: Fix cache permissions
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" clients/synology/.cache server/target || true

      # Sidecar consumed by the dynamic package-source worker: version, md5,
      # size, description read out of the .spk itself.
      - name: Generate .info.json sidecar
        run: |
          SPK="$(ls clients/synology/dist/*.spk | head -1)"
          bun packages/synology-repo/src/gen-spk-info.ts "$SPK"

      - name: Upload .spk artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-synology-spk
          path: |
            clients/synology/dist/*.spk
            clients/synology/dist/*.spk.info.json
          if-no-files-found: error

      # The web SPA is a side effect of build.sh publish it for any static host.
      - name: Upload web SPA artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-web
          path: clients/web/dist/client
          if-no-files-found: error

  # The arm64 half of the Docker image: same single-binary model as the .spk
  # (static musl kroma-server + static ffmpeg), cross-compiled in the aarch64
  # flavor of the exact toolchain image the .spk build uses. No ARM .spk is
  # published (ARM DSM models are too weak to matter); this payload only feeds
  # the linux/arm64 image, which covers Raspberry Pi 4/5 and other ARM64 hosts.
  # The web SPA is arch-independent and reused from the .spk payload.
  arm64:
    name: Build arm64 payload
    needs: changes
    permissions:
      contents: read
    if: >-
      always() && !cancelled()
      && (startsWith(github.ref, 'refs/tags/v')
          || github.event_name == 'workflow_dispatch'
          || needs.changes.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TARGET: aarch64-unknown-linux-musl
      # Digest-pinned like the x86_64 image in clients/synology/build.sh: a
      # moving tag swaps rustc underneath and invalidates the cached target dir.
      RUST_IMAGE: messense/rust-musl-cross:aarch64-musl@sha256:ecae5dd62d1c938c14f8071d36c16fa699860aace03bfb5284fb1216474d2643
      FFMPEG_URL: https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same warm-target rationale as the .spk cache above, per-arch key.
      - name: Cache cargo registry + aarch64 target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .cargo-registry
            server/target/aarch64-unknown-linux-musl
          key: synology-arm64-v1-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            synology-arm64-v1-

      # Mirrors clients/synology/build.sh step 2: server/ -> /home/rust/src
      # (WORKDIR), packages/ -> /home/rust/packages (i18n.rs include_str!s the
      # shared locale catalogs from outside server/), cargo registry cached.
      - name: Cross-compile kroma-server (aarch64 musl)
        run: |
          mkdir -p .cargo-registry
          docker run --rm \
            -v "$PWD/server":/home/rust/src \
            -v "$PWD/packages":/home/rust/packages \
            -v "$PWD/.cargo-registry":/root/.cargo/registry \
            "$RUST_IMAGE" \
            cargo build --release --locked --target "$TARGET" --features whisper-local

      # The container runs as root; hand the tree back so actions/cache can save.
      - name: Fix cache permissions
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" server/target .cargo-registry || true

      - name: Fetch static ffmpeg/ffprobe (arm64)
        run: |
          set -euo pipefail
          curl -fSL --proto '=https' --proto-redir '=https' "$FFMPEG_URL" -o ff.tar.xz
          mkdir -p ffmpeg-arm64
          tar xJf ff.tar.xz -C ffmpeg-arm64 --strip-components=1

      - name: Stage the arm64 payload
        run: |
          set -euo pipefail
          mkdir -p payload/bin payload/ffmpeg
          install -m755 "server/target/$TARGET/release/kroma-server" payload/bin/kroma-server
          install -m755 ffmpeg-arm64/ffmpeg payload/ffmpeg/ffmpeg
          install -m755 ffmpeg-arm64/ffprobe payload/ffmpeg/ffprobe

      - name: Upload arm64 payload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-linux-arm64
          path: payload
          if-no-files-found: error

  # The Docker image is ASSEMBLED from prebuilt payloads (static musl binaries +
  # web SPA + static ffmpeg), not compiled again: this replaced a ~13-minute
  # from-source docker.yml build with a copy + push. linux/amd64 reuses the .spk
  # payload, linux/arm64 the payload from the arm64 job; Dockerfile.runtime
  # picks per platform via TARGETARCH. Runs for main pushes and tags alike,
  # same tag scheme as before (latest + <version> on main, semver on tags).
  docker:
    name: Docker image (multi-arch, from prebuilt payloads)
    needs: [build, arm64]
    # `changes` is skipped on tag pushes, and that "skipped" propagates through
    # `build` to this job unless we override the default success() gate. Run
    # whenever both payload builds actually succeeded (tags + relevant pushes).
    if: always() && !cancelled() && needs.build.result == 'success' && needs.arm64.result == 'success'
    permissions:
      contents: read
      packages: write # push the Docker image to ghcr
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kroma-synology-spk
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kroma-linux-arm64
          path: arm64-payload

      # Context layout Dockerfile.runtime expects: web/ shared (arch-independent
      # SPA from the .spk payload) + one bin/ + ffmpeg/ pair per TARGETARCH.
      - name: Assemble the multi-arch build context
        id: payload
        run: |
          set -euo pipefail
          SPK="$(ls dist/*.spk | head -1)"
          mkdir -p spk-payload docker-ctx/amd64 docker-ctx/arm64
          tar -xOf "$SPK" package.tgz | tar -xz -C spk-payload
          mv spk-payload/web docker-ctx/web
          mv spk-payload/bin spk-payload/ffmpeg docker-ctx/amd64/
          mv arm64-payload/bin arm64-payload/ffmpeg docker-ctx/arm64/
          chmod +x docker-ctx/*/bin/* docker-ctx/*/ffmpeg/*
          ls -R docker-ctx | head -20
          # INFO version from the filename: kroma-<version>-x86_64.spk
          NAME="$(basename "$SPK")"; V="${NAME#kroma-}"; V="${V%-x86_64.spk}"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      # qemu: the runner is amd64; the arm64 leg's RUN steps (apt-get) execute
      # emulated. The kroma binaries themselves are prebuilt, only COPYed.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags/labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.payload.outputs.version }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: docker-ctx
          file: server/Dockerfile.runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # tag -> attach the .spk + sidecar to that version's GitHub Release.
  publish-stable:
    name: Attach .spk to the release
    # See the docker job: guard with always()/needs.build so the skipped `changes`
    # job on tag pushes does not skip this attach (the bug that left v0.1.25/0.1.26
    # releases without a .spk, freezing the package source at 0.1.24).
    if: always() && !cancelled() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write # create/update the release + upload assets
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kroma-synology-spk
          path: dist
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/*.spk
            dist/*.spk.info.json
          generate_release_notes: true

  # main -> rolling `nightly` prerelease with a FIXED asset name, so the catalog
  # link stays stable while the .spk bytes (and INFO version) change each build.
  # The .info.json sidecar rides along so the dynamic source knows the real
  # canary version + md5 without downloading the .spk.
  publish-nightly:
    name: Publish nightly prerelease
    if: always() && !cancelled() && needs.build.result == 'success' && github.ref == 'refs/heads/main'
    needs: build
    permissions:
      contents: write # create/update the rolling nightly release + assets
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kroma-synology-spk
          path: dist
      - name: Upload to the nightly prerelease
        run: |
          cp dist/*.spk kroma-nightly-x86_64.spk
          bun packages/synology-repo/src/gen-spk-info.ts kroma-nightly-x86_64.spk --beta
          gh release view nightly >/dev/null 2>&1 \
            || gh release create nightly --prerelease --title "KROMA nightly" \
                 --notes "Rolling nightly build from main. Unstable; auto-updates via the nightly package source."
          gh release upload nightly kroma-nightly-x86_64.spk kroma-nightly-x86_64.spk.info.json --clobber
