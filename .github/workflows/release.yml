name: Build & Release

# Tagging `vX.Y.Z` builds EVERY client artifact + publishes a GitHub Release:
#   - Synology .spk (server + web SPA + ffmpeg, x86_64 musl)
#   - Desktop installers (macOS .dmg, Windows .exe/.msi, Linux .AppImage/.deb)
#   - LG webOS .ipk - ONE package carrying BOTH tiers (modern Chrome 99+ AND the
#     legacy Chromium 53-94 bundle for 2018-2023 TVs, runtime-gated)
#   - Samsung Tizen .wgt (signed with a throwaway author certificate; TVs in
#     developer mode accept it)
#   - Android TV .apk (release-signed when the keystore secrets are set, else
#     debug-signed for sideloading)
#   - Module bundles (.lmod, zstd, one per build target) + modules.json: the
#     machine-readable store catalog the in-app Admin -> Modules Store browses
#     via releases/latest/download/modules.json
#
# All bundles are PRODUCTION builds: `vite build`, console/debugger stripped by
# the shared TV shell factory, no LUMA_TV_DEVICE dev mode.
#
# Manual runs build artifacts without publishing a Release; `targets` scopes the
# run (all | spk | desktop | tv | modules).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.1.0). Defaults to server/Cargo.toml.'
        required: false
      targets:
        description: 'What to build'
        type: choice
        options: [all, spk, desktop, tv, modules]
        default: all
        required: false

permissions:
  contents: write # create the Release + upload assets

# Serialize releases per tag/ref, but NEVER cancel an in-flight one: a superseded
# release build could leave a partially-uploaded Release. Queue instead of cancel.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.14'

jobs:
  # One version for every artifact: the tag, the manual input, or the
  # server/Cargo.toml base. `triplet` is the sanitized x.y.z the TV stores
  # require (appinfo.json / config.xml reject suffixes).
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.v.outputs.version }}
      triplet: ${{ steps.v.outputs.triplet }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#v}"            # tag v0.1.0 -> 0.1.0
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' server/Cargo.toml | head -1)"
          fi
          T="${V%%-*}"                          # 0.1.0-rc1 -> 0.1.0 (TV manifests)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "triplet=$T" >> "$GITHUB_OUTPUT"
          echo "Version: $V (TV manifests: $T)"

  # NB: the Synology .spk + its GitHub Pages "package source" (stable + nightly)
  # live in their own workflow, .github/workflows/synology.yml.

  # Runtime-installable module bundles: every module packed to a zstd .lmod the
  # in-app Store installs (or an admin uploads) with no server rebuild. Built
  # PER TARGET (a sidecar .lmod carries a native binary, so its platform must
  # match the server): each matrix entry cross-compiles the sidecar binaries and
  # suffixes the bundle with the triple; the catalog job below merges every
  # target into one published index. x86_64 musl is fully static, so the one
  # build covers the Synology .spk, the Docker image and any x86_64 Linux host.
  #
  # The native binaries are built INSIDE the same musl cross-toolchain image the
  # Synology .spk build uses (messense/rust-musl-cross), which is proven to link
  # the heavy sidecars (candle in whisper/vector, librqbit in torrents) for musl
  # a plain host `musl-gcc` lacks the C/C++ sysroot they need. The build plan is
  # derived from each module's Cargo.toml, then run in the container; the .lmod
  # staging + zstd packing (and each module's vite frontend) run on the host.
  modules:
    name: Modules (.lmod ${{ matrix.target }})
    needs: version
    if: ${{ github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","modules"]'), github.event.inputs.targets) }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        # Add an entry (triple + its rust-musl-cross image) to publish more
        # platforms; the catalog picks up whatever targets appear.
        include:
          - target: x86_64-unknown-linux-musl
            image: messense/rust-musl-cross:x86_64-musl
    env:
      LMOD_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache the cross-build's cargo registry + server/target (both mounted into
      # the container below) so a re-run doesn't rebuild candle from scratch.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: server
          key: lmod-${{ matrix.target }}

      # Cross-compile every sidecar binary in the proven musl toolchain image.
      # Mirrors clients/synology/build.sh: server/ -> /home/rust/src (WORKDIR),
      # packages/ -> /home/rust/packages (luma-i18n `include_str!`s the shared
      # locale catalogs from outside server/), cargo registry cached.
      - name: Cross-compile sidecar binaries (musl)
        run: |
          set -euo pipefail
          bun run scripts/lmod-build-plan.ts > /tmp/lmod-build.sh
          echo "=== build plan ==="; cat /tmp/lmod-build.sh
          mkdir -p "$HOME/.cargo/registry"
          docker run --rm \
            -v "$PWD/server":/home/rust/src \
            -v "$PWD/packages":/home/rust/packages \
            -v "$HOME/.cargo/registry":/root/.cargo/registry \
            -v /tmp/lmod-build.sh:/tmp/lmod-build.sh:ro \
            "${{ matrix.image }}" \
            bash -euo pipefail /tmp/lmod-build.sh

      # Stage + zstd-pack each prebuilt binary (and build its vite frontend) into
      # dist/modules/<id>-<target>.lmod (+ a .sha256 sidecar each). LMOD_SKIP_BUILD
      # reuses the binaries the container just produced.
      - name: Pack all modules
        env:
          LMOD_SKIP_BUILD: '1'
        run: bun run modules:pack

      - name: Upload .lmod artifacts (+ checksums)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: luma-modules-${{ matrix.target }}
          path: dist/modules/*.lmod*
          if-no-files-found: error

  # The module registry index: merge every target's bundles, generate the
  # machine-readable catalog (schema 2: per-target artifacts, sha256, deps,
  # minServer), and attach EVERYTHING to the Release together. The catalog is
  # published as `modules.json`, so
  #   https://github.com/<owner>/<repo>/releases/latest/download/modules.json
  # is the stable store URL the server's Admin -> Modules page browses.
  modules-catalog:
    name: Modules catalog (modules.json)
    needs: [version, modules]
    if: ${{ github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","modules"]'), github.event.inputs.targets) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Collect every target's bundles
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: luma-modules-*
          path: dist/modules
          merge-multiple: true

      - name: Generate the catalog
        run: |
          bun run scripts/gen-registry.ts \
            --base "https://github.com/${{ github.repository }}/releases/download/v${{ needs.version.outputs.version }}"
          cp dist/registry/catalog.json dist/registry/modules.json

      - name: Upload registry artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: luma-modules-registry
          path: dist/registry/modules.json
          if-no-files-found: error

      - name: Attach bundles + catalog to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/modules/*.lmod*
            dist/registry/modules.json

  # -------------------------------------------------------------------- TV ---

  webos:
    name: webOS .ipk (modern + legacy tiers)
    needs: version
    if: ${{ github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","tv"]'), github.event.inputs.targets) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Builds BOTH tiers (modern ESM + legacy ES2015/flattened CSS + the
      # runtime engine gate in index.html) and runs the Chromium-53 compat guard.
      - name: Build (production, both tiers)
        run: bun run build:webos

      # webOS requires a plain x.y.z in appinfo.json.
      - name: Stamp version ${{ needs.version.outputs.triplet }}
        run: |
          node -e "const f='clients/webos/dist/appinfo.json';const fs=require('fs');const j=JSON.parse(fs.readFileSync(f,'utf8'));j.version='${{ needs.version.outputs.triplet }}';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      # ares-package needs no signing; TVs install the .ipk via the Dev Mode app.
      # --no-minify: the bundles are already minified by Vite, and ares' own
      # (ancient) minifier cannot parse modern ES2020 output (hls.js chunk).
      - name: Package .ipk
        run: |
          npm install -g @webos-tools/cli
          ares-package clients/webos/dist -o clients/webos/out --no-minify

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: luma-webos-ipk
          path: clients/webos/out/*.ipk
          if-no-files-found: error

      - name: Attach to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: clients/webos/out/*.ipk

  tizen:
    name: Tizen .wgt (dev-certificate signed)
    needs: version
    if: ${{ github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","tv"]'), github.event.inputs.targets) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TIZEN_STUDIO_VER: '6.0'
      # Throwaway author certificate generated per run: Samsung TVs in developer
      # mode accept any author cert (re-installing over an app signed with a
      # DIFFERENT cert requires uninstalling it first).
      TIZEN_CERT_PASS: lumaci-2026
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (production)
        run: bun run build:tizen

      # Tizen requires a plain x.y.z in config.xml (the <widget> tag, line 2).
      - name: Stamp version ${{ needs.version.outputs.triplet }}
        run: |
          sed -i -E 's/(<widget[^>]*version=")[^"]*/\1${{ needs.version.outputs.triplet }}/' clients/tizen/dist/config.xml
          grep -o 'version="[^"]*"' clients/tizen/dist/config.xml | head -1

      - name: Cache Tizen Studio installer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: web-cli.bin
          key: tizen-cli-${{ env.TIZEN_STUDIO_VER }}

      - name: Install Tizen Studio CLI
        run: |
          if [ ! -f web-cli.bin ]; then
            wget -q -O web-cli.bin "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"
          fi
          chmod +x web-cli.bin
          ./web-cli.bin --accept-license --no-java-check "$HOME/tizen-studio"
          echo "$HOME/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      - name: Create signing profile (throwaway author certificate)
        run: |
          tizen certificate -a LUMA -p "$TIZEN_CERT_PASS" -f luma-ci
          tizen security-profiles add -n luma-ci \
            -a "$HOME/tizen-studio-data/keystore/author/luma-ci.p12" -p "$TIZEN_CERT_PASS"
          # The CLI records password FILE references it cannot read back in a
          # headless run; inline the plaintext passwords (no-ops if not present).
          P="$HOME/tizen-studio-data/profile/profiles.xml"
          sed -i "s|password=\"[^\"]*luma-ci\.pwd\"|password=\"$TIZEN_CERT_PASS\"|g" "$P"
          sed -i "s|password=\"[^\"]*tizen-distributor-signer\.pwd\"|password=\"tizenpkcs12passfordsigner\"|g" "$P"

      - name: Package .wgt
        run: tizen package -t wgt -s luma-ci -- clients/tizen/dist

      - name: Upload .wgt artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: luma-tizen-wgt
          path: clients/tizen/dist/*.wgt
          if-no-files-found: error

      - name: Attach to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: clients/tizen/dist/*.wgt

  androidtv:
    name: Android TV .apk
    needs: version
    if: ${{ github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","tv"]'), github.event.inputs.targets) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: '8.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Web bundle (production) -> synced into android/app/src/main/assets/luma.
      - name: Build web bundle
        run: bun run build:androidtv

      # Release-sign when the keystore secrets exist; otherwise ship the
      # debug-signed APK (installable via adb / Downloader for sideloading).
      - name: Release keystore (optional)
        id: ks
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE" ]; then
            echo "No ANDROID_KEYSTORE secret; building a debug-signed APK."
            echo "task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk=debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE" | base64 -d > "$RUNNER_TEMP/luma.keystore"
          {
            echo "LUMA_ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/luma.keystore"
            echo "LUMA_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "LUMA_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "LUMA_ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
          echo "task=assembleRelease" >> "$GITHUB_OUTPUT"
          echo "apk=release/app-release.apk" >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: |
          # versionCode: minutes since 2020, monotonic across releases.
          VC=$(( ( $(date -u +%s) - 1577836800 ) / 60 ))
          gradle -p clients/androidtv/android ${{ steps.ks.outputs.task }} \
            -PlumaVersion="${{ needs.version.outputs.triplet }}" -PlumaVersionCode="$VC"
          mkdir -p out
          cp "clients/androidtv/android/app/build/outputs/apk/${{ steps.ks.outputs.apk }}" \
            "out/LUMA-androidtv-${{ needs.version.outputs.version }}.apk"

      - name: Upload .apk artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: luma-androidtv-apk
          path: out/*.apk
          if-no-files-found: error

      - name: Attach to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: out/*.apk

  # --------------------------------------------------------------- Desktop ---

  desktop:
    name: Desktop ${{ matrix.label }}
    if: ${{ github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","desktop"]'), github.event.inputs.targets) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon .dmg (+ .app). Intel/universal would be a separate matrix
          # entry (macos-13) - most Macs are arm64 now.
          - os: macos-14
            label: 'macOS (.dmg)'
            bundles: app,dmg
            artifact: luma-desktop-macos
            files: |
              clients/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          # NSIS .exe installer + .msi.
          - os: windows-latest
            label: 'Windows (.exe + .msi)'
            bundles: nsis,msi
            artifact: luma-desktop-windows
            files: |
              clients/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
              clients/desktop/src-tauri/target/release/bundle/msi/*.msi
          # Steam Deck / Linux .AppImage. Ubuntu 22.04 = oldest base with WebKitGTK
          # 4.1 (Tauri v2's floor), keeping the AppImage's glibc low enough for SteamOS.
          - os: ubuntu-22.04
            label: 'Linux (.AppImage + .deb)'
            bundles: appimage,deb
            artifact: luma-desktop-linux
            files: |
              clients/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              clients/desktop/src-tauri/target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # The repo's rust-toolchain.toml pins the exact version; this just ensures
      # rustup is present so it can auto-install the pin.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: clients/desktop/src-tauri

      # Tauri v2 Linux system deps (macOS/Windows need none). mpv is NOT a build dep:
      # on Linux we drive the mpv binary over IPC at runtime; on macOS libmpv is
      # off by default (feature `libmpv`), so no installer needs it.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            file

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Bundle a self-contained mpv (pinned pkgforge AppImage, sha256-verified) as
      # the `luma-mpv` sidecar: SteamOS ships no mpv and its rootfs is read-only.
      - name: Fetch bundled mpv (Linux sidecar)
        if: runner.os == 'Linux'
        run: bash clients/desktop/scripts/fetch-mpv.sh

      # Windows Authenticode: import the PFX + inject its thumbprint so `tauri build`
      # signs the .exe/.msi. No-ops (unsigned) when the secret is unset.
      - name: Windows code-signing setup
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) { Write-Host 'No WINDOWS_CERTIFICATE secret; building unsigned.'; exit 0 }
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pass = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pass
          $conf = 'clients/desktop/src-tauri/tauri.conf.json'
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          if (-not $json.bundle.PSObject.Properties['windows']) { $json.bundle | Add-Member windows (@{}) }
          $json.bundle.windows | Add-Member certificateThumbprint $cert.Thumbprint -Force
          $json | ConvertTo-Json -Depth 30 | Set-Content $conf
          Write-Host "Signing with thumbprint $($cert.Thumbprint)"

      # beforeBuildCommand builds the @luma/tv frontend to dist, then Tauri bundles the
      # shell + frontend into the platform installer(s). Signing is driven by repo
      # secrets: on macOS Tauri imports APPLE_CERTIFICATE + notarizes with APPLE_ID/etc;
      # on Windows the step above injects the cert. With NO secrets set the bundles are
      # unsigned (macOS shows a Gatekeeper prompt, Windows a SmartScreen one).
      # macOS: only sign if APPLE_CERTIFICATE actually imports - otherwise build UNSIGNED
      # (Gatekeeper prompt) instead of hard-failing the release, mirroring the Windows guard.
      - name: Check macOS signing cert
        if: runner.os == 'macOS'
        id: macsign
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE secret; building unsigned."
            echo "sign=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          kc="$RUNNER_TEMP/luma-check.keychain-db"
          security create-keychain -p '' "$kc"
          security unlock-keychain -p '' "$kc"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12" 2>/dev/null || true
          security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign >/dev/null 2>&1 || true
          # Only sign if a genuine, valid Developer ID Application identity is present -
          # a merely-importable cert (or none, e.g. no paid membership) builds UNSIGNED.
          if security find-identity -v -p codesigning "$kc" | grep -q "Developer ID Application"; then
            echo "Valid Developer ID Application cert; signing enabled."
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No valid Developer ID Application cert; building UNSIGNED (open with right-click > Open or xattr -dr com.apple.quarantine)."
            echo "sign=false" >> "$GITHUB_OUTPUT"
          fi
          security delete-keychain "$kc" >/dev/null 2>&1 || true
          rm -f "$RUNNER_TEMP/cert.p12"

      # Unsigned / non-macOS: NO APPLE_* env at all, so tauri never attempts a codesign.
      # (An empty-but-present APPLE_CERTIFICATE still makes `security import` fail, so the
      # signing env must be absent entirely, not just empty - hence two separate steps.)
      # TAURI_SIGNING_PRIVATE_KEY is unrelated to codesigning: tauri.conf.json has
      # createUpdaterArtifacts:true, so EVERY build must sign the updater artifacts.
      - name: Build installer(s)
        if: steps.macsign.outputs.sign != 'true'
        working-directory: clients/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: bun run tauri build --bundles ${{ matrix.bundles }}

      # macOS with a verified Developer ID cert: sign + notarize via the Apple secrets.
      - name: Build installer(s) (macOS signed)
        if: steps.macsign.outputs.sign == 'true'
        working-directory: clients/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run tauri build --bundles ${{ matrix.bundles }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

      - name: Attach to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ matrix.files }}
