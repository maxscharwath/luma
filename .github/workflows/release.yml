name: Build & Release

# Tagging `vX.Y.Z` builds EVERY client artifact + publishes a GitHub Release:
#   - Synology .spk (server + web SPA + ffmpeg, x86_64 musl)
#   - Desktop installers (macOS .dmg, Windows .exe/.msi, Linux .AppImage/.deb)
#   - LG webOS .ipk - ONE package carrying BOTH tiers (modern Chrome 99+ AND the
#     legacy Chromium 53-94 bundle for 2018-2023 TVs, runtime-gated)
#   - Samsung Tizen .wgt (signed with a throwaway author certificate; TVs in
#     developer mode accept it)
#   - Android TV .apk (release-signed when the keystore secrets are set, else
#     debug-signed for sideloading)
#   - Mobile .apk + .ipa, pushed to the two beta channels BETA.md points testers
#     at (Firebase App Distribution, TestFlight). Stable tags only, and NOT in
#     the publish job's `needs`: a beta-channel hiccup must never hold back a
#     server release.
#   - Module bundles (.kmod, zstd, one per build target) + modules.json: the
#     machine-readable store catalog the in-app Admin -> Modules Store browses
#     via releases/latest/download/modules.json
#
# All bundles are PRODUCTION builds: `vite build`, console/debugger stripped by
# the shared TV shell factory, no KROMA_TV_DEVICE dev mode.
#
# NIGHTLY channel: the nightly schedule (or a manual run with publish=nightly)
# builds the SAME artifact set versioned `X.Y.Z-nightly.YYYYMMDD` and publishes
# it to the rolling `nightly` prerelease (which also carries the per-push canary
# .spk from synology.yml) - so a normal release and a nightly ship the same way,
# and tagging is only needed for actual stable releases. Nights with no new
# commits on main skip everything (~30s guard run).
#
# Manual runs build artifacts without publishing a Release; `targets` scopes the
# run (all | spk | desktop | tv | modules).
#
# The per-platform build jobs live in reusable workflows (_release-*.yml) that
# this file calls; the calling job here carries the SAME gate as the jobs it
# wraps, so a skipped platform still propagates a skip to `publish`.

on:
  push:
    tags: ['v*']
  schedule:
    - cron: '0 3 * * *' # nightly, 03:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.1.0). Defaults to server/Cargo.toml.'
        required: false
      targets:
        description: 'What to build'
        type: choice
        options: [all, spk, desktop, tv, mobile, modules]
        default: all
        required: false
      publish:
        description: 'Publish the artifacts (none = build only)'
        type: choice
        options: [none, nightly]
        default: none
        required: false

# Serialize releases per tag/ref, but NEVER cancel an in-flight one: a superseded
# release build could leave a partially-uploaded Release. Queue instead of cancel.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.14'

jobs:
  # One version for every artifact: the tag, the manual input, or the
  # server/Cargo.toml base. `triplet` is the sanitized x.y.z the TV stores
  # require (appinfo.json / config.xml reject suffixes). Also decides the
  # channel (stable tag / nightly / build-only) and, for nightlies, whether
  # there is anything new to build (proceed=false when main hasn't moved since
  # the last published nightly-manifest.json).
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    permissions:
      contents: read # only reads the repo and uploads run artifacts
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    outputs:
      version: ${{ steps.v.outputs.version }}
      triplet: ${{ steps.v.outputs.triplet }}
      channel: ${{ steps.v.outputs.channel }}
      proceed: ${{ steps.v.outputs.proceed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: v
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_INPUT: ${{ github.event.inputs.publish }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: .github/scripts/resolve-version.sh

  # NB: the Synology .spk + its GitHub Pages "package source" (stable + nightly)
  # live in their own workflow, .github/workflows/synology.yml.

  # Module .kmod bundles (one per build target) + the modules.json store catalog.
  modules:
    name: Modules
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","modules"]'), github.event.inputs.targets)) }}
    uses: ./.github/workflows/_release-modules.yml
    permissions:
      contents: write # passed down to the called workflow
    with:
      version: ${{ needs.version.outputs.version }}
      channel: ${{ needs.version.outputs.channel }}
      proceed: ${{ needs.version.outputs.proceed }}
    secrets: inherit

  # -------------------------------------------------------------------- TV ---

  # webOS .ipk + Tizen .wgt + Android TV .apk.
  tv:
    name: TV
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","tv"]'), github.event.inputs.targets)) }}
    uses: ./.github/workflows/_release-tv.yml
    permissions:
      contents: write # passed down to the called workflow
    with:
      version: ${{ needs.version.outputs.version }}
      triplet: ${{ needs.version.outputs.triplet }}
      proceed: ${{ needs.version.outputs.proceed }}
    secrets: inherit

  # ---------------------------------------------------------------- Mobile ---

  # Firebase App Distribution + TestFlight. Deliberately absent from the
  # publish/publish-nightly `needs` below: a beta-channel hiccup must never hold
  # back a server release.
  mobile:
    name: Mobile
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && (needs.version.outputs.channel == 'stable' || github.event_name == 'workflow_dispatch') && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","mobile"]'), github.event.inputs.targets)) }}
    uses: ./.github/workflows/_release-mobile.yml
    permissions:
      contents: write # passed down to the called workflow
    with:
      version: ${{ needs.version.outputs.version }}
      triplet: ${{ needs.version.outputs.triplet }}
      channel: ${{ needs.version.outputs.channel }}
      proceed: ${{ needs.version.outputs.proceed }}
    secrets: inherit

  # --------------------------------------------------------------- Desktop ---

  # macOS .dmg + Windows .exe/.msi + Linux .AppImage/.deb.
  desktop:
    name: Desktop
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","desktop"]'), github.event.inputs.targets)) }}
    uses: ./.github/workflows/_release-desktop.yml
    permissions:
      contents: write # passed down to the called workflow
    with:
      version: ${{ needs.version.outputs.version }}
      channel: ${{ needs.version.outputs.channel }}
      proceed: ${{ needs.version.outputs.proceed }}
    secrets: inherit

  # ------------------------------------------------------------- Publish ---

  # Flip the draft release live ONLY once every artifact job has attached its
  # assets. This is what keeps `releases/latest/download/modules.json` (the
  # module Store's default registry URL) stable: without it, the new release
  # becomes "latest" the moment the FIRST job attaches, and the URL 404s until
  # the catalog lands (or forever, if a job fails mid-rollout). Publishing is
  # atomic: either the complete release goes live, or the previous one stays
  # "latest". A failed rollout leaves a draft to inspect/delete.
  publish:
    name: Publish the Release
    needs: [version, modules, tv, desktop]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach assets to the Release
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: v${{ needs.version.outputs.version }}
    steps:
      - name: Flip the draft live (marked latest)
        run: .github/scripts/publish-release.sh

  # Nightly channel: gather EVERY artifact this run built and publish them onto
  # the rolling `nightly` prerelease - the same release the per-push canary .spk
  # (synology.yml) lives on, so one URL carries the whole nightly fleet. Old
  # installers are cleared first (the canary .spk pair is preserved), then the
  # new set + nightly-manifest.json (sha/version/date - also the no-new-commits
  # guard for the next scheduled run) go up. Plain `needs` = publish only when
  # every build succeeded, mirroring the stable draft-flip atomicity.
  publish-nightly:
    name: Publish the nightly prerelease
    needs: [version, modules, tv, desktop]
    if: needs.version.outputs.channel == 'nightly'
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach assets to the Release
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history for the commit log in the release notes

      - name: Collect every artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets
          merge-multiple: true

      - name: Publish onto the rolling nightly release
        run: .github/scripts/publish-nightly.sh
