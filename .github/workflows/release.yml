name: Build & Release

# Tagging `vX.Y.Z` builds EVERY client artifact + publishes a GitHub Release:
#   - Synology .spk (server + web SPA + ffmpeg, x86_64 musl)
#   - Desktop installers (macOS .dmg, Windows .exe/.msi, Linux .AppImage/.deb)
#   - LG webOS .ipk - ONE package carrying BOTH tiers (modern Chrome 99+ AND the
#     legacy Chromium 53-94 bundle for 2018-2023 TVs, runtime-gated)
#   - Samsung Tizen .wgt (signed with a throwaway author certificate; TVs in
#     developer mode accept it)
#   - Android TV .apk (release-signed when the keystore secrets are set, else
#     debug-signed for sideloading)
#   - Mobile .apk + .ipa, pushed to the two beta channels BETA.md points testers
#     at (Firebase App Distribution, TestFlight). Stable tags only, and NOT in
#     the publish job's `needs`: a beta-channel hiccup must never hold back a
#     server release.
#   - Module bundles (.kmod, zstd, one per build target) + modules.json: the
#     machine-readable store catalog the in-app Admin -> Modules Store browses
#     via releases/latest/download/modules.json
#
# All bundles are PRODUCTION builds: `vite build`, console/debugger stripped by
# the shared TV shell factory, no KROMA_TV_DEVICE dev mode.
#
# NIGHTLY channel: the nightly schedule (or a manual run with publish=nightly)
# builds the SAME artifact set versioned `X.Y.Z-nightly.YYYYMMDD` and publishes
# it to the rolling `nightly` prerelease (which also carries the per-push canary
# .spk from synology.yml) - so a normal release and a nightly ship the same way,
# and tagging is only needed for actual stable releases. Nights with no new
# commits on main skip everything (~30s guard run).
#
# Manual runs build artifacts without publishing a Release; `targets` scopes the
# run (all | spk | desktop | tv | modules).

on:
  push:
    tags: ['v*']
  schedule:
    - cron: '0 3 * * *' # nightly, 03:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.1.0). Defaults to server/Cargo.toml.'
        required: false
      targets:
        description: 'What to build'
        type: choice
        options: [all, spk, desktop, tv, mobile, modules]
        default: all
        required: false
      publish:
        description: 'Publish the artifacts (none = build only)'
        type: choice
        options: [none, nightly]
        default: none
        required: false

permissions:
  contents: write # create the Release + upload assets

# Serialize releases per tag/ref, but NEVER cancel an in-flight one: a superseded
# release build could leave a partially-uploaded Release. Queue instead of cancel.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.14'

jobs:
  # One version for every artifact: the tag, the manual input, or the
  # server/Cargo.toml base. `triplet` is the sanitized x.y.z the TV stores
  # require (appinfo.json / config.xml reject suffixes). Also decides the
  # channel (stable tag / nightly / build-only) and, for nightlies, whether
  # there is anything new to build (proceed=false when main hasn't moved since
  # the last published nightly-manifest.json).
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    outputs:
      version: ${{ steps.v.outputs.version }}
      triplet: ${{ steps.v.outputs.triplet }}
      channel: ${{ steps.v.outputs.channel }}
      proceed: ${{ steps.v.outputs.proceed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: v
        shell: bash
        run: |
          CHANNEL=none
          PROCEED=true
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#v}"            # tag v0.1.0 -> 0.1.0
            CHANNEL=stable
          elif [ "${{ github.event_name }}" = "schedule" ] \
            || [ "${{ github.event.inputs.publish }}" = "nightly" ]; then
            BASE="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' server/Cargo.toml | head -1)"
            V="$BASE-nightly.$(date -u +%Y%m%d)"
            CHANNEL=nightly
            # Skip the whole fleet when main hasn't moved since the last nightly.
            LAST="$(gh release download nightly -p nightly-manifest.json -O - 2>/dev/null | jq -r '.sha // empty' || true)"
            if [ "$LAST" = "$GITHUB_SHA" ]; then
              PROCEED=false
              echo "No new commits since the last nightly ($LAST); skipping."
            fi
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' server/Cargo.toml | head -1)"
          fi
          T="${V%%-*}"                          # 0.1.0-rc1 -> 0.1.0 (TV manifests)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "triplet=$T" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"
          echo "Version: $V (TV manifests: $T, channel: $CHANNEL, proceed: $PROCEED)"

  # NB: the Synology .spk + its GitHub Pages "package source" (stable + nightly)
  # live in their own workflow, .github/workflows/synology.yml.

  # Runtime-installable module bundles: every module packed to a zstd .kmod the
  # in-app Store installs (or an admin uploads) with no server rebuild. Built
  # PER TARGET (a sidecar .kmod carries a native binary, so its platform must
  # match the server): each matrix entry cross-compiles the sidecar binaries and
  # suffixes the bundle with the triple; the catalog job below merges every
  # target into one published index. The musl builds are fully static, so one
  # build per CPU arch covers everything on Linux: x86_64 musl serves the
  # Synology .spk, the linux/amd64 Docker image and any x86_64 host; aarch64
  # musl serves the linux/arm64 Docker image (Raspberry Pi & co) and any ARM64
  # host.
  #
  # Per-target build strategy:
  #  - linux musl: built INSIDE the same musl cross-toolchain image the Synology
  #    .spk build uses (messense/rust-musl-cross), which is proven to link the
  #    heavy sidecars (candle in whisper/vector, librqbit in torrents) for musl
  #    a plain host `musl-gcc` lacks the C/C++ sysroot they need. The build plan
  #    is derived from each module's Cargo.toml, then run in the container; the
  #    .kmod staging + zstd packing (and each vite frontend) run on the host.
  #  - macOS arm64 (dev servers): built natively on a macos runner, no container
  #    (modules:pack compiles + packs in one step).
  modules:
    name: Modules (.kmod ${{ matrix.target }})
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","modules"]'), github.event.inputs.targets)) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      matrix:
        # Add an entry to publish more platforms (image = cross container, blank
        # = native build); the catalog picks up whatever targets appear.
        include:
          # Digest-pinned: a moving tag swaps rustc underneath and invalidates
          # the whole cached target dir (same pin as clients/synology/build.sh).
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            image: messense/rust-musl-cross:x86_64-musl@sha256:ce75e9174325d4fbb3de85c309e2d7ca29f7500169bc4b5d2c611ff7e86d549a
          # aarch64 flavor of the same cross image: ARM64 Linux hosts (Raspberry
          # Pi 4/5, ARM servers) + the linux/arm64 half of the Docker image.
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            image: messense/rust-musl-cross:aarch64-musl@sha256:ecae5dd62d1c938c14f8071d36c16fa699860aace03bfb5284fb1216474d2643
          - target: aarch64-apple-darwin
            runner: macos-14
            image: ''
    env:
      KMOD_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        if: matrix.image == ''
        with:
          targets: ${{ matrix.target }}

      # Cache the cargo registry + server/target (mounted into the container on
      # the cross legs) so a re-run doesn't rebuild candle from scratch.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: server
          key: kmod-${{ matrix.target }}

      # Cross legs: compile every sidecar binary in the proven musl toolchain
      # image. Mirrors clients/synology/build.sh: server/ -> /home/rust/src
      # (WORKDIR), packages/ -> /home/rust/packages (kroma-i18n `include_str!`s
      # the shared locale catalogs from outside server/), cargo registry cached.
      - name: Cross-compile sidecar binaries (container)
        if: matrix.image != ''
        run: |
          set -euo pipefail
          bun run scripts/kmod-build-plan.ts > /tmp/kmod-build.sh
          echo "=== build plan ==="; cat /tmp/kmod-build.sh
          mkdir -p "$HOME/.cargo/registry"
          docker run --rm \
            -v "$PWD/server":/home/rust/src \
            -v "$PWD/packages":/home/rust/packages \
            -v "$HOME/.cargo/registry":/root/.cargo/registry \
            -v /tmp/kmod-build.sh:/tmp/kmod-build.sh:ro \
            "${{ matrix.image }}" \
            bash -euo pipefail /tmp/kmod-build.sh

      # The container runs as root and leaves root-owned files in server/target
      # AND in the mounted ~/.cargo/registry; rust-cache's post-save step then
      # died on the registry half ("tar: ../../../.cargo/registry/...: Cannot
      # open: Permission denied" -> exit 2 -> "Failed to save"), so the cache
      # NEVER persisted and every release recompiled the full dep tree (candle,
      # librqbit, ... ~11 min). rust-cache saves ~/.cargo too, so BOTH trees
      # must be handed back before anything tries to read or save them.
      - name: Fix target ownership (container leg)
        if: always() && matrix.image != ''
        run: sudo chown -R "$(id -u):$(id -g)" server/target "$HOME/.cargo" || true

      # Stage + zstd-pack each binary (and build its vite frontend) into
      # dist/modules/<id>-<target>.kmod (+ a .sha256 sidecar each). On cross
      # legs KMOD_SKIP_BUILD reuses the binaries the container just produced;
      # native legs compile with the host toolchain inside modules:pack.
      - name: Pack all modules
        env:
          KMOD_SKIP_BUILD: ${{ matrix.image != '' && '1' || '0' }}
        run: bun run modules:pack

      - name: Upload .kmod artifacts (+ checksums)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-modules-${{ matrix.target }}
          path: dist/modules/*.kmod*
          if-no-files-found: error

  # The module registry index: merge every target's bundles, generate the
  # machine-readable catalog (schema 2: per-target artifacts, sha256, deps,
  # minServer), and attach EVERYTHING to the Release together. The catalog is
  # published as `modules.json`, so
  #   https://github.com/<owner>/<repo>/releases/latest/download/modules.json
  # is the stable store URL the server's Admin -> Modules page browses.
  modules-catalog:
    name: Modules catalog (modules.json)
    needs: [version, modules]
    if: ${{ github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","modules"]'), github.event.inputs.targets) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Collect every target's bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kroma-modules-*
          path: dist/modules
          merge-multiple: true

      - name: Generate the catalog
        run: |
          # Nightly bundles live under the rolling `nightly` release, stable
          # ones under the version tag.
          if [ "${{ needs.version.outputs.channel }}" = "nightly" ]; then
            REF="nightly"
          else
            REF="v${{ needs.version.outputs.version }}"
          fi
          bun run scripts/gen-registry.ts \
            --base "https://github.com/${{ github.repository }}/releases/download/$REF"
          cp dist/registry/catalog.json dist/registry/modules.json

      - name: Upload registry artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-modules-registry
          path: dist/registry/modules.json
          if-no-files-found: error

      - name: Attach bundles + catalog to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          # Attach into a DRAFT: `releases/latest` ignores drafts, so the
          # previous complete release keeps serving modules.json until the
          # publish job below flips this one live with every asset present.
          draft: true
          files: |
            dist/modules/*.kmod*
            dist/registry/modules.json

  # -------------------------------------------------------------------- TV ---

  webos:
    name: webOS .ipk (modern + legacy tiers)
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","tv"]'), github.event.inputs.targets)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Builds BOTH tiers (modern ESM + legacy ES2015/flattened CSS + the
      # runtime engine gate in index.html) and runs the Chromium-53 compat guard.
      - name: Build (production, both tiers)
        run: bun run build:webos

      # webOS requires a plain x.y.z in appinfo.json.
      - name: Stamp version ${{ needs.version.outputs.triplet }}
        run: |
          node -e "const f='clients/webos/dist/appinfo.json';const fs=require('fs');const j=JSON.parse(fs.readFileSync(f,'utf8'));j.version='${{ needs.version.outputs.triplet }}';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      # ares-package needs no signing; TVs install the .ipk via the Dev Mode app.
      # --no-minify: the bundles are already minified by Vite, and ares' own
      # (ancient) minifier cannot parse modern ES2020 output (hls.js chunk).
      - name: Package .ipk
        run: |
          npm install -g @webos-tools/cli
          ares-package clients/webos/dist -o clients/webos/out --no-minify

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-webos-ipk
          path: clients/webos/out/*.ipk
          if-no-files-found: error

      - name: Attach to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          # Attach into a DRAFT: `releases/latest` ignores drafts, so the
          # previous complete release keeps serving modules.json until the
          # publish job below flips this one live with every asset present.
          draft: true
          files: clients/webos/out/*.ipk

  tizen:
    name: Tizen .wgt (dev-certificate signed)
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","tv"]'), github.event.inputs.targets)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TIZEN_STUDIO_VER: '6.0'
      # Throwaway author certificate generated per run: Samsung TVs in developer
      # mode accept any author cert (re-installing over an app signed with a
      # DIFFERENT cert requires uninstalling it first).
      TIZEN_CERT_PASS: kromaci-2026
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (production)
        run: bun run build:tizen

      # Tizen requires a plain x.y.z in config.xml (the <widget> tag, line 2).
      - name: Stamp version ${{ needs.version.outputs.triplet }}
        run: |
          sed -i -E 's/(<widget[^>]*version=")[^"]*/\1${{ needs.version.outputs.triplet }}/' clients/tizen/dist/config.xml
          grep -o 'version="[^"]*"' clients/tizen/dist/config.xml | head -1

      - name: Cache Tizen Studio installer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: web-cli.bin
          key: tizen-cli-${{ env.TIZEN_STUDIO_VER }}

      - name: Install Tizen Studio CLI
        run: |
          if [ ! -f web-cli.bin ]; then
            wget -q -O web-cli.bin "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"
          fi
          chmod +x web-cli.bin
          ./web-cli.bin --accept-license --no-java-check "$HOME/tizen-studio"
          echo "$HOME/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      - name: Create signing profile (throwaway author certificate)
        run: |
          tizen certificate -a KROMA -p "$TIZEN_CERT_PASS" -f kroma-ci
          tizen security-profiles add -n kroma-ci \
            -a "$HOME/tizen-studio-data/keystore/author/kroma-ci.p12" -p "$TIZEN_CERT_PASS"
          # The CLI records password FILE references it cannot read back in a
          # headless run; inline the plaintext passwords (no-ops if not present).
          P="$HOME/tizen-studio-data/profile/profiles.xml"
          sed -i "s|password=\"[^\"]*kroma-ci\.pwd\"|password=\"$TIZEN_CERT_PASS\"|g" "$P"
          sed -i "s|password=\"[^\"]*tizen-distributor-signer\.pwd\"|password=\"tizenpkcs12passfordsigner\"|g" "$P"

      - name: Package .wgt
        run: tizen package -t wgt -s kroma-ci -- clients/tizen/dist

      - name: Upload .wgt artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-tizen-wgt
          path: clients/tizen/dist/*.wgt
          if-no-files-found: error

      - name: Attach to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          # Attach into a DRAFT: `releases/latest` ignores drafts, so the
          # previous complete release keeps serving modules.json until the
          # publish job below flips this one live with every asset present.
          draft: true
          files: clients/tizen/dist/*.wgt

  androidtv:
    name: Android TV .apk
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","tv"]'), github.event.inputs.targets)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: '8.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Web bundle (production) -> synced into android/app/src/main/assets/kroma.
      - name: Build web bundle
        run: bun run build:androidtv

      # Release-sign when the keystore secrets exist; otherwise ship the
      # debug-signed APK (installable via adb / Downloader for sideloading).
      - name: Release keystore (optional)
        id: ks
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE" ]; then
            echo "No ANDROID_KEYSTORE secret; building a debug-signed APK."
            echo "task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk=debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE" | base64 -d > "$RUNNER_TEMP/kroma.keystore"
          {
            echo "KROMA_ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/kroma.keystore"
            echo "KROMA_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "KROMA_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "KROMA_ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
          echo "task=assembleRelease" >> "$GITHUB_OUTPUT"
          echo "apk=release/app-release.apk" >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: |
          # versionCode: minutes since 2020, monotonic across releases.
          VC=$(( ( $(date -u +%s) - 1577836800 ) / 60 ))
          gradle -p clients/androidtv/android ${{ steps.ks.outputs.task }} \
            -PkromaVersion="${{ needs.version.outputs.triplet }}" -PkromaVersionCode="$VC"
          mkdir -p out
          cp "clients/androidtv/android/app/build/outputs/apk/${{ steps.ks.outputs.apk }}" \
            "out/KROMA-androidtv-${{ needs.version.outputs.version }}.apk"

      - name: Upload .apk artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-androidtv-apk
          path: out/*.apk
          if-no-files-found: error

      - name: Attach to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          # Attach into a DRAFT: `releases/latest` ignores drafts, so the
          # previous complete release keeps serving modules.json until the
          # publish job below flips this one live with every asset present.
          draft: true
          files: out/*.apk

  # ---------------------------------------------------------------- Mobile ---
  #
  # The phone/tablet client goes to the two beta channels BETA.md points testers
  # at: Firebase App Distribution (Android) and TestFlight (iOS). Stable tags
  # only - a nightly would burn a TestFlight build number and spam every tester.
  #
  # Both legs stamp the release version and a monotonic build number INTO
  # app.json before `expo prebuild`, because that is the only moment the values
  # reach the generated projects (the template bakes `versionCode 1` /
  # `versionName` from it). Re-uploading a build number App Store Connect has
  # already seen is rejected outright, so the number must never repeat.
  #
  # `expo prebuild` runs under NODE, never under the bun runtime: bun's runtime
  # corrupts the template extraction (NUL-padded files). bun stays the package
  # manager.

  mobile-android:
    name: Mobile .apk (Firebase)
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && needs.version.outputs.channel == 'stable' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","mobile"]'), github.event.inputs.targets)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '22'

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Stamp version + build number into app.json
        run: node .github/scripts/stamp-mobile-version.mjs "${{ needs.version.outputs.triplet }}"

      - name: Prebuild the Android project
        working-directory: clients/mobile
        run: npx expo prebuild --platform android --no-install

      # The Expo template signs `release` with the DEBUG keystore. That is fine
      # for App Distribution (it is not the Play Store), but it does mean this
      # APK and a future Play build are signed by different keys, so testers
      # would have to reinstall rather than update. Revisit when/if this ships
      # to the Play Store.
      - name: Build APK
        working-directory: clients/mobile/android
        run: |
          ./gradlew assembleRelease --no-daemon
          mkdir -p "$GITHUB_WORKSPACE/out"
          cp app/build/outputs/apk/release/app-release.apk \
            "$GITHUB_WORKSPACE/out/KROMA-mobile-${{ needs.version.outputs.version }}.apk"

      - name: Upload .apk artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-mobile-apk
          path: out/*.apk
          if-no-files-found: error

      # Skipped (not failed) without the secrets, like every other optional
      # signing/publishing step in this workflow: the APK is still built and
      # attached to the Release, it just is not pushed to the testers.
      # The secrets check lives INSIDE the script, not in `if:`: a step's own
      # `env:` block is not readable from its `if:` (that context is evaluated
      # first), and `secrets` is not available there at all. Same shape as the
      # optional keystore step in the Android TV job.
      - name: Distribute to Firebase App Distribution
        if: github.event_name == 'push'
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TESTER_GROUPS: ${{ vars.FIREBASE_TESTER_GROUPS || 'testers' }}
        run: |
          set -euo pipefail
          if [ -z "$FIREBASE_APP_ID" ] || [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "No FIREBASE_APP_ID / FIREBASE_SERVICE_ACCOUNT; the APK is built and"
            echo "attached to the Release, but not pushed to the testers."
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx --yes firebase-tools appdistribution:distribute \
            "out/KROMA-mobile-${{ needs.version.outputs.version }}.apk" \
            --app "$FIREBASE_APP_ID" \
            --release-notes-file clients/mobile/distribution/release-notes.txt \
            --groups "$FIREBASE_TESTER_GROUPS"
          rm -f "$RUNNER_TEMP/firebase-sa.json"

      - name: Attach to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          files: out/*.apk

  mobile-ios:
    name: Mobile .ipa (TestFlight)
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && needs.version.outputs.channel == 'stable' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","mobile"]'), github.event.inputs.targets)) }}
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '22'

      # An App Store build needs a real Apple Distribution identity and an
      # App Store provisioning profile for tv.kroma.mobile. Without them there
      # is nothing uploadable, so the whole job no-ops rather than failing the
      # release (the desktop job takes the same stance on its signing cert).
      - name: Check signing secrets
        id: signing
        env:
          IOS_CERTIFICATE: ${{ secrets.MOBILE_IOS_CERTIFICATE }}
          IOS_PROFILE: ${{ secrets.MOBILE_IOS_PROVISIONING_PROFILE }}
        run: |
          if [ -z "$IOS_CERTIFICATE" ] || [ -z "$IOS_PROFILE" ]; then
            echo "No MOBILE_IOS_CERTIFICATE / MOBILE_IOS_PROVISIONING_PROFILE; skipping the iOS build."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.signing.outputs.ready == 'true'
        run: bun install --frozen-lockfile

      - name: Stamp version + build number into app.json
        if: steps.signing.outputs.ready == 'true'
        run: node .github/scripts/stamp-mobile-version.mjs "${{ needs.version.outputs.triplet }}"

      - name: Prebuild the iOS project
        if: steps.signing.outputs.ready == 'true'
        working-directory: clients/mobile
        run: |
          npx expo prebuild --platform ios --no-install
          cd ios && pod install

      - name: Import certificate + provisioning profile
        if: steps.signing.outputs.ready == 'true'
        env:
          IOS_CERTIFICATE: ${{ secrets.MOBILE_IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.MOBILE_IOS_CERTIFICATE_PASSWORD }}
          IOS_PROFILE: ${{ secrets.MOBILE_IOS_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail
          kc="$RUNNER_TEMP/kroma-ios.keychain-db"
          pw=$(uuidgen)
          security create-keychain -p "$pw" "$kc"
          security set-keychain-settings -lut 21600 "$kc"
          security unlock-keychain -p "$pw" "$kc"
          echo "$IOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/ios-cert.p12"
          security import "$RUNNER_TEMP/ios-cert.p12" -k "$kc" -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$pw" "$kc" >/dev/null
          security list-keychain -d user -s "$kc" login.keychain-db
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROFILE" | base64 --decode \
            > "$HOME/Library/MobileDevice/Provisioning Profiles/kroma.mobileprovision"
          rm -f "$RUNNER_TEMP/ios-cert.p12"

      - name: Archive + export .ipa
        if: steps.signing.outputs.ready == 'true'
        working-directory: clients/mobile/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild -workspace KROMA.xcworkspace -scheme KROMA \
            -configuration Release -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/KROMA.xcarchive" \
            -allowProvisioningUpdates archive
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/KROMA.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"
          mkdir -p "$GITHUB_WORKSPACE/out"
          cp "$RUNNER_TEMP/export"/*.ipa \
            "$GITHUB_WORKSPACE/out/KROMA-mobile-${{ needs.version.outputs.version }}.ipa"

      # An App Store Connect API key is preferred; the app-specific password the
      # desktop job already uses for notarization is the fallback.
      - name: Upload to TestFlight
        if: ${{ steps.signing.outputs.ready == 'true' && github.event_name == 'push' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          set -euo pipefail
          IPA="out/KROMA-mobile-${{ needs.version.outputs.version }}.ipa"
          if [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER_ID" ] && [ -n "$ASC_PRIVATE_KEY" ]; then
            mkdir -p "$HOME/.appstoreconnect/private_keys"
            printf '%s' "$ASC_PRIVATE_KEY" \
              > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
            xcrun altool --upload-app -f "$IPA" -t ios \
              --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
            rm -rf "$HOME/.appstoreconnect"
          elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ]; then
            xcrun altool --upload-app -f "$IPA" -t ios -u "$APPLE_ID" -p "$APPLE_PASSWORD"
          else
            echo "No App Store Connect credentials; the .ipa is built but not uploaded."
          fi

      - name: Upload .ipa artifact
        if: steps.signing.outputs.ready == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-mobile-ipa
          path: out/*.ipa
          if-no-files-found: error

  # --------------------------------------------------------------- Desktop ---

  desktop:
    name: Desktop ${{ matrix.label }}
    needs: version
    if: ${{ needs.version.outputs.proceed == 'true' && (github.event_name != 'workflow_dispatch' || contains(fromJSON('["all","desktop"]'), github.event.inputs.targets)) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon .dmg (+ .app). Intel/universal would be a separate matrix
          # entry (macos-13) - most Macs are arm64 now.
          - os: macos-14
            label: 'macOS (.dmg)'
            bundles: app,dmg
            artifact: kroma-desktop-macos
            files: |
              clients/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          # NSIS .exe installer + .msi. Nightly builds drop the .msi: WiX wants
          # a numeric a.b.c[.d] and rejects the -nightly.YYYYMMDD prerelease.
          - os: windows-latest
            label: 'Windows (.exe + .msi)'
            bundles: nsis,msi
            nightly_bundles: nsis
            artifact: kroma-desktop-windows
            files: |
              clients/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
              clients/desktop/src-tauri/target/release/bundle/msi/*.msi
          # Steam Deck / Linux .AppImage. Ubuntu 22.04 = oldest base with WebKitGTK
          # 4.1 (Tauri v2's floor), keeping the AppImage's glibc low enough for SteamOS.
          - os: ubuntu-22.04
            label: 'Linux (.AppImage + .deb)'
            bundles: appimage,deb
            artifact: kroma-desktop-linux
            files: |
              clients/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              clients/desktop/src-tauri/target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # The repo's rust-toolchain.toml pins the exact version; this just ensures
      # rustup is present so it can auto-install the pin.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      # shared-key `desktop-release`: the SAME release build runs here and in
      # desktop-autoupdate.yml, which used to cache under two different
      # job-derived keys (~400 MB x 3 OSes, twice over) and warm neither. One
      # key per OS = half the quota and a warm start for whichever runs next.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: clients/desktop/src-tauri
          shared-key: desktop-release

      # Tauri v2 Linux system deps. NB: the Linux release is built --no-default-features
      # (see the build step), i.e. WITHOUT the in-process libmpv engine, so no
      # libmpv-dev here: ubuntu-22.04 (kept for its low glibc = SteamOS compat) only
      # ships libmpv.so.1 (mpv 0.34), too old for the libmpv2 crate (needs .so.2 /
      # mpv 0.35+). Linux keeps the mpv BINARY (which is itself libmpv, out-of-process);
      # the in-process engine ships in source, ready once a Deck-compatible libmpv.so.2
      # is sourced. mac/Windows DO bundle in-process libmpv (their own modern libmpv).
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            file

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Stamp the release version into the installers so a desktop build always
      # matches the release (stable tag = X.Y.Z, nightly = X.Y.Z-nightly.DATE).
      # Skipped only for a bare build-only dispatch (channel none).
      - name: Stamp release version
        if: needs.version.outputs.channel != 'none'
        shell: bash
        env:
          VER: ${{ needs.version.outputs.version }}
        run: |
          node -e "const f='clients/desktop/src-tauri/tauri.conf.json';const fs=require('fs');const j=JSON.parse(fs.readFileSync(f,'utf8'));j.version=process.env.VER;fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      # Bundle a self-contained mpv (pinned pkgforge AppImage, sha256-verified) as
      # the `kroma-mpv` sidecar: SteamOS ships no mpv and its rootfs is read-only.
      # Still needed: the binary is the Linux libmpv fallback (fix-appimage.sh
      # restores its pristine bytes; the .deb depends on the system mpv).
      - name: Fetch bundled mpv (Linux sidecar)
        if: runner.os == 'Linux'
        run: bash clients/desktop/scripts/fetch-mpv.sh

      # macOS: libmpv to LINK against (brew) + dylibbundler to EMBED it (+ its ffmpeg
      # dylib tree) into KROMA.app so the .dmg runs without Homebrew. See the
      # "Bundle libmpv into the .app" step below.
      - name: Install libmpv build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install mpv dylibbundler

      # Windows: fetch a pinned libmpv-2.dll + synthesise the MSVC import lib mpv.lib
      # from it (LLVM is pre-installed on the runner). Sets KROMA_MPV_LIB_DIR (consumed
      # by build.rs's link search) + KROMA_MPV_DLL (bundled next to the .exe) in
      # $GITHUB_ENV. The DLL is self-contained (ffmpeg statically linked in), so one
      # file ships beside the executable.
      - name: Fetch + prepare libmpv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./clients/desktop/scripts/fetch-libmpv-windows.ps1

      # Stage the DLL at a FIXED path the bundler config references (tauri.windows.
      # conf.json bundle.resources), since KROMA_MPV_DLL is a dynamic scratch path.
      - name: Stage libmpv-2.dll for bundling (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "$env:KROMA_MPV_DLL" clients/desktop/src-tauri/libmpv-2.dll -Force

      # Windows Authenticode: import the PFX + inject its thumbprint so `tauri build`
      # signs the .exe/.msi. No-ops (unsigned) when the secret is unset.
      - name: Windows code-signing setup
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) { Write-Host 'No WINDOWS_CERTIFICATE secret; building unsigned.'; exit 0 }
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pass = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pass
          $conf = 'clients/desktop/src-tauri/tauri.conf.json'
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          if (-not $json.bundle.PSObject.Properties['windows']) { $json.bundle | Add-Member windows (@{}) }
          $json.bundle.windows | Add-Member certificateThumbprint $cert.Thumbprint -Force
          $json | ConvertTo-Json -Depth 30 | Set-Content $conf
          Write-Host "Signing with thumbprint $($cert.Thumbprint)"

      # beforeBuildCommand builds the @kroma/tv frontend to dist, then Tauri bundles the
      # shell + frontend into the platform installer(s). Signing is driven by repo
      # secrets: on macOS Tauri imports APPLE_CERTIFICATE + notarizes with APPLE_ID/etc;
      # on Windows the step above injects the cert. With NO secrets set the bundles are
      # unsigned (macOS shows a Gatekeeper prompt, Windows a SmartScreen one).
      # macOS: only sign if APPLE_CERTIFICATE actually imports - otherwise build UNSIGNED
      # (Gatekeeper prompt) instead of hard-failing the release, mirroring the Windows guard.
      - name: Check macOS signing cert
        if: runner.os == 'macOS'
        id: macsign
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE secret; building unsigned."
            echo "sign=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          kc="$RUNNER_TEMP/kroma-check.keychain-db"
          security create-keychain -p '' "$kc"
          security unlock-keychain -p '' "$kc"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12" 2>/dev/null || true
          security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign >/dev/null 2>&1 || true
          # Only sign if a genuine, valid Developer ID Application identity is present -
          # a merely-importable cert (or none, e.g. no paid membership) builds UNSIGNED.
          if security find-identity -v -p codesigning "$kc" | grep -q "Developer ID Application"; then
            echo "Valid Developer ID Application cert; signing enabled."
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No valid Developer ID Application cert; building UNSIGNED (open with right-click > Open or xattr -dr com.apple.quarantine)."
            echo "sign=false" >> "$GITHUB_OUTPUT"
          fi
          security delete-keychain "$kc" >/dev/null 2>&1 || true
          rm -f "$RUNNER_TEMP/cert.p12"

      # Windows/Linux: tauri builds + signs in one pass (Windows Authenticode via the
      # thumbprint injected earlier). macOS is handled separately below - it must EMBED
      # libmpv into the .app before the dmg is sealed, and sign AFTER that. NO APPLE_*
      # env here (an empty APPLE_CERTIFICATE would make tauri's `security import` fail).
      # TAURI_SIGNING_PRIVATE_KEY signs the updater artifacts (createUpdaterArtifacts).
      # Windows builds WITH libmpv (default features) + the fetched mpv.lib/dll; Linux
      # builds --no-default-features (mpv binary engine only) because ubuntu-22.04's
      # libmpv is too old for the libmpv2 crate (see the deps step above).
      - name: Build installer(s) (Windows/Linux)
        if: runner.os != 'macOS'
        working-directory: clients/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        # `--no-default-features` is a cargo flag: the Tauri v2 CLI only forwards it
        # to the runner after `--` (a bare `--no-default-features` is rejected).
        run: bun run tauri build --bundles ${{ needs.version.outputs.channel == 'nightly' && matrix.nightly_bundles || matrix.bundles }} ${{ runner.os == 'Linux' && '-- --no-default-features' || '' }}

      # macOS: build the .app UNSIGNED, embed libmpv so it is self-contained, THEN sign
      # + notarize + package the dmg. This order is REQUIRED: dylibbundler rewrites the
      # Mach-O load commands (invalidating any signature), and the dmg must carry the
      # already-embedded app. This replaces tauri's built-in macOS sign/notarize/dmg.
      - name: Build .app (macOS)
        if: runner.os == 'macOS'
        working-directory: clients/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: bun run tauri build --bundles app

      - name: Embed libmpv into the .app (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          APP=$(find clients/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -n1)
          bash clients/desktop/scripts/bundle-libmpv-macos.sh "$APP"

      # Sign deep (incl. the embedded dylibs) + notarize when a Developer ID cert is
      # present, then package the dmg. The macsign step already validated + then DELETED
      # its keychain, so re-import the cert here. NOTE: the signed path needs a CI run
      # with the real APPLE_* secrets to confirm end-to-end; the unsigned path (hdiutil
      # dmg) mirrors what was validated locally.
      - name: Sign + notarize + package dmg (macOS)
        if: runner.os == 'macOS'
        env:
          SIGN: ${{ steps.macsign.outputs.sign }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          BUNDLE=clients/desktop/src-tauri/target/release/bundle
          APP=$(find "$BUNDLE/macos" -maxdepth 1 -name '*.app' | head -n1)
          if [ "$SIGN" = "true" ]; then
            kc="$RUNNER_TEMP/kroma-sign.keychain-db"
            security create-keychain -p '' "$kc"
            security default-keychain -s "$kc"
            security unlock-keychain -p '' "$kc"
            echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k '' "$kc" >/dev/null
            codesign --deep --force --timestamp --options runtime --sign "$APPLE_SIGNING_IDENTITY" "$APP"
            ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app.zip"
            xcrun notarytool submit "$RUNNER_TEMP/app.zip" \
              --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$APP"
          fi
          mkdir -p "$BUNDLE/dmg"
          DMG="$BUNDLE/dmg/KROMA_$(uname -m).dmg"
          hdiutil create -volname KROMA -srcfolder "$APP" -ov -format UDZO "$DMG"
          if [ "$SIGN" = "true" ]; then
            codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$DMG"
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$DMG"
          fi

      # Tauri's default bundler sweeps the runner's wayland/glib/gstreamer libs
      # into the AppImage, which breaks it on Mesa 25+ hosts (SteamOS 3.7+,
      # Fedora 41+: "Could not create default EGL display: EGL_BAD_PARAMETER",
      # no window) - tauri-apps/tauri#15665. Strip + repack. No .sig concern
      # here: this workflow ships no updater artifacts (the desktop-latest
      # channel does; its workflow re-signs after the same fix).
      - name: Fix AppImage over-bundling (tauri#15665)
        if: runner.os == 'Linux'
        run: bash clients/desktop/scripts/fix-appimage.sh clients/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

      - name: Attach to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          # Attach into a DRAFT: `releases/latest` ignores drafts, so the
          # previous complete release keeps serving modules.json until the
          # publish job below flips this one live with every asset present.
          draft: true
          files: ${{ matrix.files }}

  # ------------------------------------------------------------- Publish ---

  # Flip the draft release live ONLY once every artifact job has attached its
  # assets. This is what keeps `releases/latest/download/modules.json` (the
  # module Store's default registry URL) stable: without it, the new release
  # becomes "latest" the moment the FIRST job attaches, and the URL 404s until
  # the catalog lands (or forever, if a job fails mid-rollout). Publishing is
  # atomic: either the complete release goes live, or the previous one stays
  # "latest". A failed rollout leaves a draft to inspect/delete.
  publish:
    name: Publish the Release
    needs: [version, modules-catalog, webos, tizen, androidtv, desktop]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: v${{ needs.version.outputs.version }}
    steps:
      - name: Flip the draft live (marked latest)
        run: |
          set -euo pipefail
          # The per-artifact upload steps (across this workflow AND synology.yml)
          # each attach via softprops/action-gh-release, which is NOT atomic: in a
          # concurrency race two runners can both create a release object for the
          # same tag, leaving the real (asset-carrying) one plus an EMPTY duplicate
          # draft. So do not blindly grab the first draft (`head -1` could pick the
          # empty one and 422 because a published same-tag release already exists).
          # Instead: publish the release that actually carries the assets, treat an
          # already-published one as success, and delete the empty duplicates.
          LIST=$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=30" \
            --jq "[.[] | select(.tag_name == \"${TAG}\") | {id, draft, assets: (.assets|length)}]")
          if [ "$(echo "$LIST" | jq 'length')" = "0" ]; then
            echo "no release object for ${TAG}"; exit 1
          fi
          # The real release = most assets; on a tie prefer an already-published one.
          TARGET=$(echo "$LIST" | jq -r 'sort_by([.assets, (if .draft then 0 else 1 end)]) | last | .id')
          DRAFT=$(echo "$LIST" | jq -r --argjson id "$TARGET" '.[] | select(.id==$id) | .draft')
          if [ "$DRAFT" = "true" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${TARGET}" \
              -F draft=false -f make_latest=true >/dev/null
            echo "published ${TAG} (release id ${TARGET})"
          else
            # A racing job or a prior run already flipped it live; just re-assert
            # latest (a no-op on the already-latest release, never a 422).
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${TARGET}" \
              -f make_latest=true >/dev/null
            echo "already published ${TAG} (release id ${TARGET}); ensured latest"
          fi
          # Clean up the empty duplicate drafts the race can leave. Guard on
          # assets == 0 so a release that carries anything is NEVER deleted.
          for DUP in $(echo "$LIST" | jq -r --argjson id "$TARGET" \
            '.[] | select(.id != $id and .draft and .assets == 0) | .id'); do
            if gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${DUP}" >/dev/null 2>&1; then
              echo "deleted empty duplicate draft ${DUP}"
            else
              echo "warn: could not delete duplicate draft ${DUP}"
            fi
          done

  # Nightly channel: gather EVERY artifact this run built and publish them onto
  # the rolling `nightly` prerelease - the same release the per-push canary .spk
  # (synology.yml) lives on, so one URL carries the whole nightly fleet. Old
  # installers are cleared first (the canary .spk pair is preserved), then the
  # new set + nightly-manifest.json (sha/version/date - also the no-new-commits
  # guard for the next scheduled run) go up. Plain `needs` = publish only when
  # every build succeeded, mirroring the stable draft-flip atomicity.
  publish-nightly:
    name: Publish the nightly prerelease
    needs: [version, modules-catalog, webos, tizen, androidtv, desktop]
    if: needs.version.outputs.channel == 'nightly'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history for the commit log in the release notes

      - name: Collect every artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets
          merge-multiple: true

      - name: Publish onto the rolling nightly release
        run: |
          set -euo pipefail
          gh release view nightly >/dev/null 2>&1 \
            || gh release create nightly --prerelease --title "KROMA nightly" --notes "Rolling nightly build from main."

          # Previous nightly sha (for the commit log) before we overwrite it.
          LAST="$(gh release download nightly -p nightly-manifest.json -O - 2>/dev/null | jq -r '.sha // empty' || true)"

          # Clear last night's assets; keep the per-push canary .spk pair.
          for A in $(gh api "repos/${GH_REPO}/releases/tags/nightly" \
              --jq '.assets[] | select(.name | startswith("kroma-nightly-x86_64.spk") | not) | .id'); do
            gh api -X DELETE "repos/${GH_REPO}/releases/assets/${A}" >/dev/null
          done

          jq -n --arg sha "$GITHUB_SHA" --arg version "$VERSION" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{sha: $sha, version: $version, date: $date}' > assets/nightly-manifest.json

          find assets -type f | sort
          find assets -type f -print0 | xargs -0 gh release upload nightly --clobber

          {
            echo "Rolling nightly build \`$VERSION\` from \`${GITHUB_SHA::10}\`."
            echo
            echo "Every artifact of a stable release, rebuilt nightly from main:"
            echo "desktop installers, TV packages, module bundles + modules.json,"
            echo "and the per-push canary Synology .spk. Unstable by definition."
            if [ -n "$LAST" ]; then
              echo
              echo "Changes since the previous nightly:"
              git log --oneline --no-decorate "$LAST"..HEAD 2>/dev/null | head -40 | sed 's/^/- /' || true
            fi
          } > notes.md
          gh release edit nightly --title "KROMA nightly ($VERSION)" --notes-file notes.md
