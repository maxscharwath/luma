name: Package-source worker

# Deploys the DYNAMIC Synology package source (packages/synology-repo/worker,
# a Cloudflare Worker) - only when the worker code itself changes. Releases
# never touch it: the worker reads the GitHub Releases API live.
#
# Needs the CLOUDFLARE_API_TOKEN repo secret (Workers Scripts: Edit). Without
# it the job fails fast with a clear message instead of a cryptic 401.
on:
  push:
    branches: [main]
    paths:
      - 'packages/synology-repo/worker/**'
      - '.github/workflows/repo-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check the Cloudflare token exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Set the CLOUDFLARE_API_TOKEN repo secret (Cloudflare dashboard -> API tokens -> 'Edit Cloudflare Workers' template)."
            exit 1
          fi

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'

      - name: Deploy the worker
        working-directory: packages/synology-repo/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler@4 deploy
