name: Package-source worker

# Deploys the Cloudflare Workers that back the KROMA package + module sources:
#   packages/synology-repo/worker  -> packages.kroma.tv  (kroma-packages)
#   packages/module-registry/worker -> modules.kroma.tv  (kroma-modules)
# Only when the worker code changes; releases never touch these (they read the
# GitHub Releases API live).
#
# Needs the CLOUDFLARE_API_TOKEN repo secret (Workers Scripts: Edit). WITHOUT it
# the job SKIPS the deploys with a notice instead of failing red - the workers
# can always be deployed by hand with `bunx wrangler deploy`.
on:
  push:
    branches: [main]
    paths:
      - 'packages/synology-repo/worker/**'
      - 'packages/module-registry/worker/**'
      - '.github/workflows/repo-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Soft gate: no token -> skip (not fail). secrets can't be read in a job-
      # level if, so surface it as a step output the deploy steps depend on.
      - name: Check for the Cloudflare token
        id: guard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN not set; skipping worker deploys (deploy by hand with 'bunx wrangler deploy')."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: steps.guard.outputs.has_token == 'true'
        with:
          bun-version: '1.3.14'

      - name: Deploy the package source (packages.kroma.tv)
        if: steps.guard.outputs.has_token == 'true'
        working-directory: packages/synology-repo/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler@4 deploy

      - name: Deploy the module registry (modules.kroma.tv)
        if: steps.guard.outputs.has_token == 'true'
        working-directory: packages/module-registry/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler@4 deploy
