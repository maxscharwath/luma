name: Desktop auto-update

# Builds the desktop clients (macOS / Windows / Linux) and publishes them to a
# rolling `desktop-latest` pre-release whenever desktop-facing code lands on main.
# The installed apps self-update from it (Tauri updater, signature-verified).
#
# Path-filtered so unrelated commits (server, docs, other clients) don't trigger a
# costly 3-OS build. Version is `<base>-<build>` (base from server/Cargo.toml, build
# = minutes since 2020) so every run is a strictly-newer prerelease the updater picks
# up. First download is unsigned (Gatekeeper/SmartScreen prompt once); every update
# after that installs silently and, on macOS, is NOT quarantined.
on:
  push:
    branches: [main]
    paths:
      - 'clients/desktop/**'
      - 'packages/tv/**'
      - 'packages/core/**'
      - 'packages/ui/**'
      - '.github/workflows/desktop-autoupdate.yml'
  workflow_dispatch:

permissions:
  contents: write

# One publish at a time; a newer push supersedes an in-flight build.
concurrency:
  group: desktop-autoupdate
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: v
        shell: bash
        run: |
          BASE="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' server/Cargo.toml | head -1)"
          BUILD=$(( ( $(date -u +%s) - 1577836800 ) / 60 ))
          echo "version=$BASE-$BUILD" >> "$GITHUB_OUTPUT"
          echo "Desktop version: $BASE-$BUILD"

  create-release:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_id: ${{ steps.mk.outputs.result }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Reset the rolling release so assets don't pile up build-over-build.
      - name: Reset rolling pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete desktop-latest --cleanup-tag --yes || true
      - name: Create draft pre-release
        id: mk
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          result-encoding: string
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'desktop-latest',
              name: 'LUMA desktop (auto-update)',
              body: `Rolling self-update build \`${{ needs.version.outputs.version }}\`.`,
              draft: true,
              prerelease: true,
              target_commitish: context.sha,
            });
            return data.id;

  build:
    needs: [version, create-release]
    strategy:
      fail-fast: false
      # Sequential so tauri-action accumulates each platform into one latest.json
      # deterministically (parallel matrix jobs can race on that shared asset).
      # Same billed minutes as parallel, just slower wall-clock, fine for updates.
      max-parallel: 1
      matrix:
        include:
          - os: macos-14
            bundles: app,dmg
          - os: windows-latest
            bundles: nsis
          - os: ubuntu-22.04
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: clients/desktop/src-tauri
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            file
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # Bundle a self-contained mpv (pinned pkgforge AppImage, sha256-verified) as
      # the `luma-mpv` sidecar: SteamOS ships no mpv and its rootfs is read-only.
      - name: Fetch bundled mpv (Linux sidecar)
        if: runner.os == 'Linux'
        run: bash clients/desktop/scripts/fetch-mpv.sh
      # Stamp the timestamped version into tauri.conf.json so this build is a
      # strictly-newer prerelease. `shell: bash` + node work on all three runners.
      - name: Stamp version ${{ needs.version.outputs.version }}
        shell: bash
        env:
          VER: ${{ needs.version.outputs.version }}
        run: |
          node -e "const f='clients/desktop/src-tauri/tauri.conf.json';const fs=require('fs');const j=JSON.parse(fs.readFileSync(f,'utf8'));j.version=process.env.VER;fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
      # Builds, signs the updater artifacts with the private key, uploads bundles +
      # accumulates latest.json onto the draft release.
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          projectPath: clients/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --bundles ${{ matrix.bundles }}

      # Tauri's default bundler sweeps the runner's wayland/glib/gstreamer libs
      # into the AppImage, which breaks it on Mesa 25+ hosts (SteamOS 3.7+:
      # "Could not create default EGL display: EGL_BAD_PARAMETER", no window) -
      # tauri-apps/tauri#15665. tauri-action has already built AND uploaded, so:
      # strip + repack the local file, re-sign it (the updater verifies the
      # signature inside latest.json), then swap the release assets and rewrite
      # that signature. Linux runs LAST in this sequential matrix, so
      # latest.json already carries every platform when this patches it.
      - name: Fix AppImage over-bundling + re-sign (tauri#15665)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          set -euo pipefail
          shopt -s nullglob
          APPIMAGES=(clients/desktop/src-tauri/target/release/bundle/appimage/*.AppImage)
          [ ${#APPIMAGES[@]} -eq 1 ] || { echo "expected exactly one AppImage, got: ${APPIMAGES[*]:-none}"; exit 1; }
          APPIMAGE="${APPIMAGES[0]}"
          bash clients/desktop/scripts/fix-appimage.sh "$APPIMAGE"

          # Re-sign the modified bundle (tauri signer reads the TAURI_SIGNING_* env).
          (cd clients/desktop && bun run tauri signer sign "$GITHUB_WORKSPACE/$APPIMAGE")
          SIG="$(cat "$APPIMAGE.sig")"
          NAME="$(basename "$APPIMAGE")"

          API="repos/${GITHUB_REPOSITORY}/releases"
          upload() { # <file> <asset-name>; prints the response JSON
            curl -sf -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$1" \
              "https://uploads.github.com/${API}/${RELEASE_ID}/assets?name=$2"
          }
          asset_id() { # <asset-name>; empty when absent
            gh api "${API}/${RELEASE_ID}/assets" --paginate \
              --jq ".[] | select(.name == \"$1\") | .id"
          }

          # Swap in the fixed AppImage + its detached .sig. On a DRAFT release
          # tauri-action writes asset-id API urls into latest.json (drafts have
          # no name-based download url), and the re-upload mints a NEW asset id,
          # so remember the old id to find the entries and patch in the new url.
          OLD_ID="$(asset_id "$NAME")"
          [ -n "$OLD_ID" ] || { echo "asset $NAME not found on release ${RELEASE_ID}"; exit 1; }
          gh api -X DELETE "${API}/assets/${OLD_ID}" >/dev/null
          NEW_URL="$(upload "$APPIMAGE" "$NAME" | jq -r '.url')"
          SIG_ID="$(asset_id "$NAME.sig")"
          [ -z "$SIG_ID" ] || gh api -X DELETE "${API}/assets/${SIG_ID}" >/dev/null
          upload "$APPIMAGE.sig" "$NAME.sig" >/dev/null

          # Rewrite url + signature for every latest.json entry that pointed at
          # the replaced asset (linux-x86_64 and linux-x86_64-appimage; the .deb
          # entry keeps its untouched asset). Match the old asset-id url, plus a
          # name-based url as a safety net should tauri-action change behavior.
          LJ_ID="$(asset_id latest.json)"
          [ -n "$LJ_ID" ] || { echo "latest.json not found on release ${RELEASE_ID}"; exit 1; }
          gh api -H "Accept: application/octet-stream" "${API}/assets/${LJ_ID}" > latest.json
          jq --arg sig "$SIG" --arg url "$NEW_URL" --arg old "/assets/${OLD_ID}" --arg name "/$NAME" \
            '.platforms |= with_entries(
               if (.value.url | (endswith($old) or endswith($name)))
               then .value.signature = $sig | .value.url = $url
               else . end)' \
            latest.json > latest.fixed.json
          gh api -X DELETE "${API}/assets/${LJ_ID}" >/dev/null
          upload latest.fixed.json latest.json >/dev/null
          echo "patched latest.json: $(jq -rc '[.platforms | to_entries[] | select(.value.url == $u) | .key]' --arg u "$NEW_URL" latest.fixed.json) -> new asset"

  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Publish the pre-release (serve latest.json)
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              make_latest: 'false',
            });
