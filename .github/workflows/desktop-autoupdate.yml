name: Desktop auto-update

# Builds the desktop clients (macOS / Windows / Linux) and publishes them to a
# rolling `desktop-latest` pre-release whenever desktop-facing code lands on main.
# The installed apps self-update from it (Tauri updater, signature-verified).
#
# Path-filtered so unrelated commits (server, docs, other clients) don't trigger a
# costly 3-OS build. Version is `<base>-<build>` (base from server/Cargo.toml, build
# = minutes since 2020) so every run is a strictly-newer prerelease the updater picks
# up. First download is unsigned (Gatekeeper/SmartScreen prompt once); every update
# after that installs silently and, on macOS, is NOT quarantined.
on:
  push:
    branches: [main]
    paths:
      - 'clients/desktop/**'
      - 'packages/tv/**'
      - 'packages/core/**'
      - 'packages/ui/**'
      - '.github/workflows/desktop-autoupdate.yml'
  workflow_dispatch:

permissions:
  contents: write

# One publish at a time; a newer push supersedes an in-flight build.
concurrency:
  group: desktop-autoupdate
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: v
        shell: bash
        run: |
          BASE="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' server/Cargo.toml | head -1)"
          BUILD=$(( ( $(date -u +%s) - 1577836800 ) / 60 ))
          echo "version=$BASE-$BUILD" >> "$GITHUB_OUTPUT"
          echo "Desktop version: $BASE-$BUILD"

  create-release:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_id: ${{ steps.mk.outputs.result }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      # Reset the rolling release so assets don't pile up build-over-build.
      - name: Reset rolling pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete desktop-latest --cleanup-tag --yes || true
      - name: Create draft pre-release
        id: mk
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          result-encoding: string
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'desktop-latest',
              name: 'LUMA desktop (auto-update)',
              body: `Rolling self-update build \`${{ needs.version.outputs.version }}\`.`,
              draft: true,
              prerelease: true,
              target_commitish: context.sha,
            });
            return data.id;

  build:
    needs: [version, create-release]
    strategy:
      fail-fast: false
      # Sequential so tauri-action accumulates each platform into one latest.json
      # deterministically (parallel matrix jobs can race on that shared asset).
      # Same billed minutes as parallel, just slower wall-clock, fine for updates.
      max-parallel: 1
      matrix:
        include:
          - os: macos-14
            bundles: app,dmg
          - os: windows-latest
            bundles: nsis
          - os: ubuntu-22.04
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: clients/desktop/src-tauri
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            file
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # Bundle a self-contained mpv (pinned pkgforge AppImage, sha256-verified) as
      # the `luma-mpv` sidecar: SteamOS ships no mpv and its rootfs is read-only.
      - name: Fetch bundled mpv (Linux sidecar)
        if: runner.os == 'Linux'
        run: bash clients/desktop/scripts/fetch-mpv.sh
      # Stamp the timestamped version into tauri.conf.json so this build is a
      # strictly-newer prerelease. `shell: bash` + node work on all three runners.
      - name: Stamp version ${{ needs.version.outputs.version }}
        shell: bash
        env:
          VER: ${{ needs.version.outputs.version }}
        run: |
          node -e "const f='clients/desktop/src-tauri/tauri.conf.json';const fs=require('fs');const j=JSON.parse(fs.readFileSync(f,'utf8'));j.version=process.env.VER;fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
      # Builds, signs the updater artifacts with the private key, uploads bundles +
      # accumulates latest.json onto the draft release.
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          projectPath: clients/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --bundles ${{ matrix.bundles }}

  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Publish the pre-release (serve latest.json)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              make_latest: 'false',
            });
