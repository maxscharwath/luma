name: Security scan

# Static analysis (CodeQL) for the JS/TS surface + a RustSec advisory audit of the
# Cargo dependency graph. Runs on pushes/PRs to main and weekly (catches new CVEs
# on unchanged code).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload the SARIF results to code-scanning
      actions: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3

  cargo-audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: server
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Informational (non-gating) for now: today's findings are all unmaintained /
      # unsound / yanked TRANSITIVE deps with no available fix (paste, ttf-parser,
      # lru, spin, instant, ...). Surfaced as a warning annotation + full log so
      # new/fixable advisories are visible; tighten to a hard gate with a triaged
      # ignore-list once the transitive noise is addressed upstream.
      - name: Audit the dependency graph (RustSec)
        working-directory: server
        run: cargo audit || echo "::warning title=cargo audit::advisories found (transitive; see the step log)"
