name: CI

# Every push/PR proves the WHOLE client fleet builds in PRODUCTION mode:
#  - web SPA
#  - Samsung Tizen bundle
#  - LG webOS bundle - BOTH tiers: modern (Chrome 99+) AND legacy (Chromium
#    53-94, 2018-2023 TVs), with the check-legacy guard that fails the build if
#    anything a legacy engine can't parse/render sneaks in
#  - Android TV web bundle + the Kotlin shell compiled to an APK
#  - the desktop (Tauri) shell via cargo check on Linux, which compiles the
#    Linux/Steam-Deck mpv path
#  - the Rust server (clippy + tests + architecture guards)
#
# No dev mode anywhere: `vite build` runs in production mode, the shared TV
# shell factory (clients/tv-build/shell.ts) strips console/debugger on build,
# and LUMA_TV_DEVICE (on-device dev HMR) is never set in CI.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: '1.3.14'

jobs:
  quality:
    name: Typecheck + unit tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Hard gate: every workspace must type-check (@luma/core, ui, tv, web, shells).
      - name: Typecheck
        run: bun run typecheck

      # Hard gate: unit tests (engine selection, direct-play planning, formatters).
      - name: Unit tests (vitest)
        run: bun run test

      # Non-blocking for now: the repo has a backlog of Biome lint findings.
      # Flip `continue-on-error` to false once `bun run check` is clean.
      - name: Biome (lint + format)
        run: bun run check
        continue-on-error: true

  clients:
    name: Client / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            build: bun run build:web
            dist: clients/web/dist
          - name: tizen
            build: bun run build:tizen
            dist: clients/tizen/dist
          # Builds BOTH tiers (modern ESM + legacy ES2015/flattened-CSS for old
          # models) and runs the Chromium-53 compat guard as part of the script.
          - name: webos
            build: bun run build:webos
            dist: clients/webos/dist
          # Web bundle synced into the Android project's assets; the APK compile
          # below is the only CI gate for the Kotlin shell.
          - name: androidtv
            build: bun run build:androidtv
            dist: clients/androidtv/dist
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (production)
        run: ${{ matrix.build }}

      - name: Set up JDK (Android shell)
        if: matrix.name == 'androidtv'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (Android shell)
        if: matrix.name == 'androidtv'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Compile Android TV APK
        if: matrix.name == 'androidtv'
        run: gradle -p clients/androidtv/android assembleDebug

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: luma-${{ matrix.name }}-ci
          path: ${{ matrix.dist }}
          retention-days: 7
          if-no-files-found: error

  desktop-shell:
    name: Desktop shell (cargo check, Linux/mpv path)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/desktop/src-tauri

      # Tauri v2 Linux system deps (compile-time only; mpv stays a runtime dep).
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # tauri's generate_context! needs the frontend dist to exist.
      - name: Build desktop frontend
        run: bun run --filter '@luma/desktop' build

      # Compiles the Linux-only mpv IPC module (watchdog, mpv_status, events)
      # that macOS dev machines cannot check.
      - name: cargo check
        working-directory: clients/desktop/src-tauri
        run: cargo check --all-targets

  server:
    name: Server (Rust) clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      # Non-blocking: the codebase uses a custom import grouping, not rustfmt's.
      - name: rustfmt --check
        run: cargo fmt --check
        continue-on-error: true

      # Hard gates. clippy without `-D warnings` (a couple of pre-existing
      # warnings are surfaced in the log but don't fail the build).
      - name: clippy
        run: cargo clippy --all-targets

      - name: test
        run: cargo test

      # Architecture guard: the domain layer (entities + pure rules) stays free of
      # I/O crates. Dependencies point inward (api → services → {db,infra} → domain);
      # domain knows nothing of axum/sqlite/ffmpeg/http. See ARCHITECTURE.md.
      - name: Domain purity (no I/O in src/domain)
        run: |
          if [ -d src/domain ] && grep -rEn 'use (axum|rusqlite|reqwest|tokio::process|std::process::Command)' src/domain; then
            echo "::error::server/src/domain must stay pure no axum/rusqlite/reqwest/process imports."
            exit 1
          fi
          echo "✓ domain layer is I/O-free"

      # Drift gate: the TS wire types in packages/core/src/generated are generated
      # from the Rust #[derive(TS)] structs. Regenerate and fail if they differ
      # from what's committed (someone changed a model but forgot `bun gen:types`).
      - name: TS bindings up to date (ts-rs)
        working-directory: ${{ github.workspace }}
        run: |
          ./scripts/gen-types.sh
          git add -A packages/core/src/generated
          git diff --cached --exit-code -- packages/core/src/generated \
            || { echo "::error::Generated TS types are stale run 'bun gen:types' and commit packages/core/src/generated."; exit 1; }
