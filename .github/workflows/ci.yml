name: CI

# Every push/PR proves the WHOLE client fleet builds in PRODUCTION mode:
#  - web SPA
#  - Samsung Tizen bundle
#  - LG webOS bundle - BOTH tiers: modern (Chrome 99+) AND legacy (Chromium
#    53-94, 2018-2023 TVs), with the check-legacy guard that fails the build if
#    anything a legacy engine can't parse/render sneaks in
#  - Android TV web bundle + the Kotlin shell compiled to an APK
#  - the desktop (Tauri) shell via cargo check on Linux, which compiles the
#    Linux/Steam-Deck mpv path
#  - the Rust server (clippy + tests + architecture guards)
#
# No dev mode anywhere: `vite build` runs in production mode, the shared TV
# shell factory (clients/tv-build/shell.ts) strips console/debugger on build,
# and KROMA_TV_DEVICE (on-device dev HMR) is never set in CI.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: '1.3.14'

jobs:
  quality:
    name: Typecheck + unit tests + lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Hard gate: every workspace must type-check (@kroma/core, ui, tv, web, shells).
      - name: Typecheck
        run: bun run typecheck

      # Hard gate: unit tests (engine selection, direct-play planning, formatters).
      - name: Unit tests (vitest)
        run: bun run test

      # Hard gate: the Biome backlog is cleared (`bun run check` is clean), so
      # lint + format regressions now fail CI.
      - name: Biome (lint + format)
        run: bun run check

  clients:
    name: Client / ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            build: bun run build:web
            dist: clients/web/dist
          - name: tizen
            build: bun run build:tizen
            dist: clients/tizen/dist
          # Builds BOTH tiers (modern ESM + legacy ES2015/flattened-CSS for old
          # models) and runs the Chromium-53 compat guard as part of the script.
          - name: webos
            build: bun run build:webos
            dist: clients/webos/dist
          # Web bundle synced into the Android project's assets; the APK compile
          # below is the only CI gate for the Kotlin shell.
          - name: androidtv
            build: bun run build:androidtv
            dist: clients/androidtv/dist
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (production)
        run: ${{ matrix.build }}

      - name: Set up JDK (Android shell)
        if: matrix.name == 'androidtv'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (Android shell)
        if: matrix.name == 'androidtv'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: '8.13'

      - name: Compile Android TV APK
        if: matrix.name == 'androidtv'
        run: gradle -p clients/androidtv/android assembleDebug

      - name: Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kroma-${{ matrix.name }}-ci
          path: ${{ matrix.dist }}
          retention-days: 7
          if-no-files-found: error

  desktop-shell:
    name: Desktop shell (cargo check, Linux/mpv path)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: clients/desktop/src-tauri

      # Tauri v2 Linux system deps (compile-time only; mpv stays a runtime dep).
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # tauri's generate_context! needs the frontend dist to exist.
      - name: Build desktop frontend
        run: bun run --filter '@kroma/desktop' build

      # tauri.linux.conf.json declares the `kroma-mpv` externalBin sidecar; fetch it
      # so the merged config always points at a real file (skips when already there).
      - name: Fetch bundled mpv (Linux sidecar)
        run: bash clients/desktop/scripts/fetch-mpv.sh

      # Compiles the Linux binary-engine path (mpv.rs IPC + mpv_dispatch routing)
      # that macOS dev machines cannot check. --no-default-features = WITHOUT the
      # in-process libmpv engine: ubuntu-22.04's libmpv is too old for the libmpv2
      # crate (needs .so.2 / mpv 0.35+), and the Linux release ships the binary
      # engine anyway. The libmpv paths are compile-checked cross-platform (macOS
      # dev / Windows via cargo-xwin); the Linux libmpv build needs a modern distro.
      - name: cargo check
        working-directory: clients/desktop/src-tauri
        run: cargo check --all-targets --no-default-features

  server:
    name: Server (Rust) clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: server

      # Non-blocking: the codebase uses a custom import grouping, not rustfmt's.
      - name: rustfmt --check
        run: cargo fmt --check
        continue-on-error: true

      # Hard gates. clippy without `-D warnings` (a couple of pre-existing
      # warnings are surfaced in the log but don't fail the build).
      - name: clippy
        run: cargo clippy --workspace --all-targets

      - name: test
        run: cargo test --workspace

      # Domain purity is now enforced by the compiler, not a grep: the entities +
      # pure rules live in the `kroma-domain` crate (crates/kroma-domain), which
      # depends only on serde. An accidental `use axum::`/`use rusqlite::` there
      # won't resolve and `cargo build` above fails. Dependencies still point
      # inward (api → services → {db,infra} → domain). See ARCHITECTURE.md.
