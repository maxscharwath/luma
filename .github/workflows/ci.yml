name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Web / TS — typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Hard gate: every workspace must type-check (@luma/core, ui, tv, web, …).
      - name: Typecheck
        run: bun run typecheck

      # Non-blocking for now: the repo has a backlog of Biome lint findings.
      # Flip `continue-on-error` to false once `bun run check` is clean.
      - name: Biome (lint + format)
        run: bun run check
        continue-on-error: true

  server:
    name: Server (Rust) — clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      # Non-blocking: the codebase uses a custom import grouping, not rustfmt's.
      - name: rustfmt --check
        run: cargo fmt --check
        continue-on-error: true

      # Hard gates. clippy without `-D warnings` (a couple of pre-existing
      # warnings are surfaced in the log but don't fail the build).
      - name: clippy
        run: cargo clippy --all-targets

      - name: test
        run: cargo test

      # Architecture guard: the domain layer (entities + pure rules) stays free of
      # I/O crates. Dependencies point inward (api → services → {db,infra} → domain);
      # domain knows nothing of axum/sqlite/ffmpeg/http. See ARCHITECTURE.md.
      - name: Domain purity (no I/O in src/domain)
        run: |
          if [ -d src/domain ] && grep -rEn 'use (axum|rusqlite|reqwest|tokio::process|std::process::Command)' src/domain; then
            echo "::error::server/src/domain must stay pure — no axum/rusqlite/reqwest/process imports."
            exit 1
          fi
          echo "✓ domain layer is I/O-free"

      # Drift gate: the TS wire types in packages/core/src/generated are generated
      # from the Rust #[derive(TS)] structs. Regenerate and fail if they differ
      # from what's committed (someone changed a model but forgot `bun gen:types`).
      - name: TS bindings up to date (ts-rs)
        working-directory: ${{ github.workspace }}
        run: |
          ./scripts/gen-types.sh
          git add -A packages/core/src/generated
          git diff --cached --exit-code -- packages/core/src/generated \
            || { echo "::error::Generated TS types are stale — run 'bun gen:types' and commit packages/core/src/generated."; exit 1; }
