<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- SteamOS runs desktop Chromium, which (unlike a TV webview) ignores a fixed
         `width=1920` viewport. So we ask for the real device width and scale the
         authored 1920x1080 TV canvas ourselves at runtime (see src/stage.ts). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>LUMA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
