# The compile-time module roster: every hand-authored first-party module the
# server links in. `bun run modules:gen` expands this (together with the
# single-file `*.module.md` modules) into the `luma-modules-generated` aggregator
# crate, so NO Rust crate hand-names the module set. To wire a module in, add it
# here and re-run `bun run modules:gen`.
#
# Fields per entry:
#   id            reverse-DNS module id (the runtime join key; matches module.json).
#   crate         its server crate, which exports `pub const MODULE`.
#   serverModule  also exports `server_module()` (backend routes / lifecycle).
#   manifestOnly  no server crate: register its module.json (+ icon) directly.
#   icon          manifestOnly + has an icon.svg to embed (default false).

# NOTE: the roster is now EMPTY -- the zero-module base build. Every first-party
# module (downloads vertical, acquisition, indexers, torznab, vpn, mdns, scene,
# whisper, vector, remote) ships ONLY as an installable `.lmod`: its manifest
# comes from the installed bundle and its backend runs out-of-process (or, for
# library modules like scene, is co-linked into the sidecars that use it). This
# is what makes every module uninstallable from Admin -> Modules. Install them
# from the Store (the GitHub-release registry) or by uploading a `.lmod`.
modules: []
